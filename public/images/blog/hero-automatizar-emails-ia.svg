<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="1200" height="630" fill="#080808"/>
  
  <!-- Container principal -->
  <rect x="40" y="40" width="1120" height="550" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="2" rx="12"/>
  
  <!-- Título superior -->
  <text x="600" y="80" text-anchor="middle" fill="#fff" font-size="18" font-weight="600">AUTOMATIZACIÓN DE EMAILS CON IA</text>
  
  <!-- Flujo de proceso -->
  <!-- Email entrante -->
  <g>
    <rect x="80" y="120" width="160" height="100" fill="#1a1a1a" stroke="#e94560" stroke-width="2" rx="8"/>
    <text x="160" y="145" text-anchor="middle" fill="#e94560" font-size="14" font-weight="600">EMAIL ENTRANTE</text>
    <text x="160" y="165" text-anchor="middle" fill="#fff" font-size="12">Consulta de precio</text>
    <text x="160" y="180" text-anchor="middle" fill="#888" font-size="11">De: maria@empresa.com</text>
    <text x="160" y="195" text-anchor="middle" fill="#888" font-size="11">Urgencia: Media</text>
  </g>
  
  <!-- Flecha 1 -->
  <path d="M250 170 L290 170" stroke="#e94560" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Análisis IA -->
  <g>
    <rect x="300" y="120" width="160" height="100" fill="#1a1a1a" stroke="#e94560" stroke-width="2" rx="8"/>
    <text x="380" y="145" text-anchor="middle" fill="#e94560" font-size="14" font-weight="600">ANÁLISIS IA</text>
    <text x="380" y="165" text-anchor="middle" fill="#fff" font-size="12">Categoría: Precios</text>
    <text x="380" y="180" text-anchor="middle" fill="#fff" font-size="12">Tono: Profesional</text>
    <text x="380" y="195" text-anchor="middle" fill="#888" font-size="11">Respuesta: Auto</text>
  </g>
  
  <!-- Flecha 2 -->
  <path d="M470 170 L510 170" stroke="#e94560" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Personalización -->
  <g>
    <rect x="520" y="120" width="160" height="100" fill="#1a1a1a" stroke="#e94560" stroke-width="2" rx="8"/>
    <text x="600" y="145" text-anchor="middle" fill="#e94560" font-size="14" font-weight="600">PERSONALIZACIÓN</text>
    <text x="600" y="165" text-anchor="middle" fill="#fff" font-size="12">Historial: Cliente</text>
    <text x="600" y="180" text-anchor="middle" fill="#fff" font-size="12">Descuento: 15%</text>
    <text x="600" y="195" text-anchor="middle" fill="#888" font-size="11">Toque humano</text>
  </g>
  
  <!-- Flecha 3 -->
  <path d="M690 170 L730 170" stroke="#e94560" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Respuesta automatizada -->
  <g>
    <rect x="740" y="120" width="160" height="100" fill="#1a1a1a" stroke="#e94560" stroke-width="2" rx="8"/>
    <text x="820" y="145" text-anchor="middle" fill="#e94560" font-size="14" font-weight="600">RESPUESTA AUTO</text>
    <text x="820" y="165" text-anchor="middle" fill="#fff" font-size="12">Tiempo: 2 minutos</text>
    <text x="820" y="180" text-anchor="middle" fill="#fff" font-size="12">Satisfacción: 95%</text>
    <text x="820" y="195" text-anchor="middle" fill="#888" font-size="11">Sin intervención</text>
  </g>
  
  <!-- Estadísticas debajo -->
  <g>
    <!-- Card de tiempo ahorrado -->
    <rect x="180" y="280" width="200" height="120" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="8"/>
    <text x="280" y="305" text-anchor="middle" fill="#e94560" font-size="16" font-weight="600">TIEMPO AHORRADO</text>
    <text x="280" y="330" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">4.2 horas</text>
    <text x="280" y="350" text-anchor="middle" fill="#888" font-size="12">por día</text>
    <text x="280" y="375" text-anchor="middle" fill="#555" font-size="11">De 126 emails recibidos</text>
    <text x="280" y="390" text-anchor="middle" fill="#555" font-size="11">85% automatizados</text>
  </g>
  
  <g>
    <!-- Card de satisfacción -->
    <rect x="420" y="280" width="200" height="120" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="8"/>
    <text x="520" y="305" text-anchor="middle" fill="#e94560" font-size="16" font-weight="600">SATISFACCIÓN</text>
    <text x="520" y="330" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">92%</text>
    <text x="520" y="350" text-anchor="middle" fill="#888" font-size="12">clientes contentos</text>
    <text x="520" y="375" text-anchor="middle" fill="#555" font-size="11">Respuestas personalizadas</text>
    <text x="520" y="390" text-anchor="middle" fill="#555" font-size="11">Tono humano mantenido</text>
  </g>
  
  <g>
    <!-- Card de escalación -->
    <rect x="660" y="280" width="200" height="120" fill="#1a1a1a" stroke="#333" stroke-width="1" rx="8"/>
    <text x="760" y="305" text-anchor="middle" fill="#e94560" font-size="16" font-weight="600">ESCALACIÓN</text>
    <text x="760" y="330" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">8%</text>
    <text x="760" y="350" text-anchor="middle" fill="#888" font-size="12">requiere humano</text>
    <text x="760" y="375" text-anchor="middle" fill="#555" font-size="11">Solo casos complejos</text>
    <text x="760" y="390" text-anchor="middle" fill="#555" font-size="11">o negociaciones críticas</text>
  </g>
  
  <!-- Tipos de email automatizables -->
  <text x="100" y="460" fill="#e94560" font-size="14" font-weight="600">EMAILS AUTOMATIZABLES:</text>
  <text x="100" y="485" fill="#fff" font-size="12">✓ Consultas de precios</text>
  <text x="300" y="485" fill="#fff" font-size="12">✓ Confirmaciones</text>
  <text x="470" y="485" fill="#fff" font-size="12">✓ Seguimientos</text>
  <text x="100" y="505" fill="#fff" font-size="12">✓ Agendamiento</text>
  <text x="300" y="505" fill="#fff" font-size="12">✓ Info básica</text>
  <text x="470" y="505" fill="#fff" font-size="12">✓ Clasificación</text>
  
  <text x="650" y="460" fill="#888" font-size="14" font-weight="600">NO AUTOMATIZAR:</text>
  <text x="650" y="485" fill="#888" font-size="12">✗ Negociaciones importantes</text>
  <text x="650" y="505" fill="#888" font-size="12">✗ Comunicaciones sensibles</text>
  
  <!-- Título del artículo -->
  <text x="600" y="550" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">Automatizar emails con IA sin perder el toque humano</text>
  
  <!-- Branding -->
  <text x="600" y="580" text-anchor="middle" fill="#555" font-size="12">tribuclaw.com</text>
  
  <!-- Definir marker para flechas -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>
</svg>