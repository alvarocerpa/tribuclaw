<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Envelope -->
  <rect x="8" y="16" width="48" height="32" rx="4" fill="none" stroke="url(#emailGrad)" stroke-width="2.5" />

  <!-- Envelope flap -->
  <path d="M 8 18 L 32 34 L 56 18" fill="none" stroke="url(#emailGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Horizontal line -->
  <line x1="8" y1="38" x2="56" y2="38" stroke="url(#emailGrad)" stroke-width="2" />

  <!-- Send indicator -->
  <circle cx="52" cy="48" r="4" fill="#e94560" />
  <line x1="50" y1="48" x2="54" y2="48" stroke="#050505" stroke-width="2" stroke-linecap="round" />
  <line x1="52" y1="46" x2="52" y2="50" stroke="#050505" stroke-width="2" stroke-linecap="round" />
</svg>
