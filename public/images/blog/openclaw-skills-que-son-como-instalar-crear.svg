<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
<rect width="800" height="350" fill="#080808"/>
<rect x="20" y="20" width="760" height="310" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<text x="400" y="55" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="15" font-weight="700">CREAR TU SKILL CUSTOM EN 3 PASOS</text>

<!-- Step 1 -->
<rect x="50" y="80" width="220" height="130" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="160" y="105" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="700">1</text>
<text x="160" y="125" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">CREAR CARPETA</text>
<rect x="65" y="140" width="190" height="28" rx="6" fill="#0d0d0d"/>
<text x="160" y="159" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">mkdir ~/.openclaw/</text>
<rect x="65" y="172" width="190" height="28" rx="6" fill="#0d0d0d"/>
<text x="160" y="191" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">skills/mi-skill/</text>

<!-- Arrow 1 -->
<text x="290" y="150" fill="#e94560" font-family="system-ui" font-size="22" font-weight="700">--></text>

<!-- Step 2 -->
<rect x="310" y="80" width="220" height="130" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="420" y="105" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="700">2</text>
<text x="420" y="125" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">ESCRIBIR SKILL.md</text>
<rect x="325" y="140" width="190" height="28" rx="6" fill="#0d0d0d"/>
<text x="420" y="159" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">name: mi-skill</text>
<rect x="325" y="172" width="190" height="28" rx="6" fill="#0d0d0d"/>
<text x="420" y="191" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">+ instrucciones MD</text>

<!-- Arrow 2 -->
<text x="550" y="150" fill="#e94560" font-family="system-ui" font-size="22" font-weight="700">--></text>

<!-- Step 3 -->
<rect x="570" y="80" width="220" height="130" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="680" y="105" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="700">3</text>
<text x="680" y="125" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">NUEVA SESION</text>
<text x="680" y="155" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">OpenClaw detecta</text>
<text x="680" y="173" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">la skill y la carga</text>
<text x="680" y="195" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11" font-weight="600">Listo para usar</text>

<!-- Tips bottom -->
<rect x="80" y="240" width="640" height="70" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="400" y="265" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12" font-weight="700">TIPS PARA SKILLS EFECTIVAS</text>
<text x="400" y="285" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Descripcion especifica | Ejemplos concretos | Gating para dependencias | Instrucciones concisas</text>
<text x="400" y="300" text-anchor="middle" fill="#555" font-family="system-ui" font-size="9">Publica con: clawhub publish</text>
</svg>
