<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <rect width="1200" height="500" fill="#0a0a0a"/>
  <!-- Left: ChatGPT -->
  <rect x="80" y="60" width="480" height="380" rx="16" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="320" y="110" text-anchor="middle" fill="#888" font-family="system-ui" font-size="20" font-weight="600">ChatGPT</text>
  <text x="320" y="160" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14">❌ Sin memoria real</text>
  <text x="320" y="190" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14">❌ No conecta a WhatsApp</text>
  <text x="320" y="220" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14">❌ Solo responde, no actúa</text>
  <text x="320" y="250" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14">❌ Tus datos en la nube</text>
  <text x="320" y="280" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14">❌ Genérico para todos</text>
  <text x="320" y="340" text-anchor="middle" fill="#666" font-family="system-ui" font-size="48">🤖</text>
  <text x="320" y="400" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Herramienta de chat</text>
  <!-- VS -->
  <text x="600" y="260" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="24" font-weight="800">VS</text>
  <!-- Right: Agente IA -->
  <rect x="640" y="60" width="480" height="380" rx="16" fill="#111" stroke="#e94560" stroke-width="2"/>
  <text x="880" y="110" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="600">Agente IA Personal</text>
  <text x="880" y="160" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="14">✅ Memoria permanente</text>
  <text x="880" y="190" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="14">✅ WhatsApp, email, calendario</text>
  <text x="880" y="220" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="14">✅ Actúa solo, 24/7</text>
  <text x="880" y="250" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="14">✅ Todo en tu servidor</text>
  <text x="880" y="280" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="14">✅ Personalizado para ti</text>
  <text x="880" y="340" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="48">🧠</text>
  <text x="880" y="400" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="13">Tu asistente personal</text>
</svg>
