<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
<rect width="1200" height="630" fill="#080808"/>
<rect x="40" y="40" width="1120" height="550" rx="20" fill="#0d0d0d" stroke="#1a1a1a"/>
<!-- Divider line -->
<line x1="600" y1="80" x2="600" y2="480" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
<!-- VS badge -->
<circle cx="600" cy="270" r="40" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="600" y="278" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22" font-weight="800">VS</text>
<!-- Left side - OpenClaw -->
<rect x="100" y="130" width="400" height="280" rx="16" fill="#111" stroke="#e94560" stroke-width="1.5" opacity="0.9"/>
<circle cx="300" cy="195" r="35" fill="#0d0d0d" stroke="#e94560" stroke-width="2"/>
<text x="300" y="200" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">OpenClaw</text>
<text x="140" y="265" fill="#e94560" font-family="system-ui" font-size="12">✓ Agente autónomo 24/7</text>
<text x="140" y="290" fill="#e94560" font-family="system-ui" font-size="12">✓ Conectado a tus herramientas</text>
<text x="140" y="315" fill="#e94560" font-family="system-ui" font-size="12">✓ Memoria persistente</text>
<text x="140" y="340" fill="#e94560" font-family="system-ui" font-size="12">✓ Ejecuta, no solo habla</text>
<text x="140" y="365" fill="#e94560" font-family="system-ui" font-size="12">✓ Open source</text>
<!-- Right side - ChatGPT -->
<rect x="700" y="130" width="400" height="280" rx="16" fill="#111" stroke="#555" stroke-width="1.5" opacity="0.9"/>
<circle cx="900" cy="195" r="35" fill="#0d0d0d" stroke="#555" stroke-width="2"/>
<text x="900" y="200" text-anchor="middle" fill="#999" font-family="system-ui" font-size="13" font-weight="700">ChatGPT</text>
<text x="740" y="265" fill="#666" font-family="system-ui" font-size="12">✗ Solo responde cuando le preguntas</text>
<text x="740" y="290" fill="#666" font-family="system-ui" font-size="12">✗ Sin integraciones reales</text>
<text x="740" y="315" fill="#666" font-family="system-ui" font-size="12">✗ Sin memoria entre sesiones</text>
<text x="740" y="340" fill="#666" font-family="system-ui" font-size="12">✗ No ejecuta acciones</text>
<text x="740" y="365" fill="#666" font-family="system-ui" font-size="12">✗ Cerrado y propietario</text>
<!-- Title -->
<text x="600" y="520" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="700">OpenClaw vs ChatGPT</text>
<text x="600" y="548" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14">Diferencias reales</text>
<text x="600" y="575" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>