<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
<rect width="1200" height="630" fill="#080808"/>
<rect x="40" y="40" width="1120" height="550" rx="20" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Centro: Agente IA -->
<circle cx="600" cy="200" r="60" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="600" y="195" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="700">AGENTE</text>
<text x="600" y="215" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="700">IA</text>

<!-- 4 cards alrededor -->
<!-- Card 1: Lee -->
<rect x="100" y="120" width="180" height="160" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="190" y="160" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="48" font-weight="300">1</text>
<text x="190" y="200" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">LEE</text>
<text x="190" y="225" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">126 emails/dia</text>
<text x="190" y="250" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">Asunto + cuerpo + adjuntos</text>

<!-- Card 2: Clasifica -->
<rect x="920" y="120" width="180" height="160" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="1010" y="160" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="48" font-weight="300">2</text>
<text x="1010" y="200" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">CLASIFICA</text>
<text x="1010" y="225" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Urgente / Importante</text>
<text x="1010" y="250" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">Reglas personalizables</text>

<!-- Card 3: Resume -->
<rect x="100" y="340" width="180" height="160" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="190" y="380" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="48" font-weight="300">3</text>
<text x="190" y="420" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">RESUME</text>
<text x="190" y="445" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Solo lo relevante</text>
<text x="190" y="470" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">De 50 a 5 emails</text>

<!-- Card 4: Notifica -->
<rect x="920" y="340" width="180" height="160" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="1010" y="380" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="48" font-weight="300">4</text>
<text x="1010" y="420" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">NOTIFICA</text>
<text x="1010" y="445" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Telegram / WhatsApp</text>
<text x="1010" y="470" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">Cuando tu quieras</text>

<!-- Conexiones -->
<line x1="280" y1="200" x2="540" y2="200" stroke="#e94560" stroke-width="1.5" stroke-dasharray="5,5"/>
<line x1="660" y1="200" x2="920" y2="200" stroke="#e94560" stroke-width="1.5" stroke-dasharray="5,5"/>
<line x1="600" y1="260" x2="190" y2="340" stroke="#e94560" stroke-width="1.5" stroke-dasharray="5,5"/>
<line x1="600" y1="260" x2="1010" y2="340" stroke="#e94560" stroke-width="1.5" stroke-dasharray="5,5"/>

<!-- Resultado central -->
<rect x="400" y="400" width="400" height="80" rx="12" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="600" y="435" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="700">-45 min/dia revisando correo</text>
<text x="600" y="460" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">Tu agente IA procesa 126 emails y te entrega 5</text>

<!-- Titulo -->
<text x="600" y="545" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="700">Agente IA que lee tus emails por ti</text>
<text x="600" y="570" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>