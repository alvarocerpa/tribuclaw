<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
<rect width="1200" height="630" fill="#080808"/>
<rect x="40" y="40" width="1120" height="550" rx="20" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Title -->
<text x="600" y="90" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="18" font-weight="700">COMPARATIVA</text>

<!-- ChatGPT Column -->
<rect x="80" y="110" width="480" height="370" rx="14" fill="#111" stroke="#555" stroke-width="1.5"/>
<text x="320" y="150" text-anchor="middle" fill="#888" font-family="system-ui" font-size="22" font-weight="700">ChatGPT</text>

<text x="110" y="190" fill="#555" font-family="system-ui" font-size="13">Memoria</text>
<text x="430" y="190" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">Fragmentos sueltos</text>
<line x1="110" y1="200" x2="530" y2="200" stroke="#1a1a1a"/>

<text x="110" y="225" fill="#555" font-family="system-ui" font-size="13">Proactividad</text>
<text x="430" y="225" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">Nula (solo responde)</text>
<line x1="110" y1="235" x2="530" y2="235" stroke="#1a1a1a"/>

<text x="110" y="260" fill="#555" font-family="system-ui" font-size="13">Integraciones</text>
<text x="430" y="260" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">Plugins limitados</text>
<line x1="110" y1="270" x2="530" y2="270" stroke="#1a1a1a"/>

<text x="110" y="295" fill="#555" font-family="system-ui" font-size="13">Privacidad</text>
<text x="430" y="295" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">Datos en OpenAI</text>
<line x1="110" y1="305" x2="530" y2="305" stroke="#1a1a1a"/>

<text x="110" y="330" fill="#555" font-family="system-ui" font-size="13">Autonomia</text>
<text x="430" y="330" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">0% (necesita humano)</text>
<line x1="110" y1="340" x2="530" y2="340" stroke="#1a1a1a"/>

<text x="110" y="365" fill="#555" font-family="system-ui" font-size="13">Personalizacion</text>
<text x="430" y="365" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">Instrucciones basicas</text>
<line x1="110" y1="375" x2="530" y2="375" stroke="#1a1a1a"/>

<text x="110" y="400" fill="#555" font-family="system-ui" font-size="13">Trabaja 24/7</text>
<text x="430" y="400" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">No</text>
<line x1="110" y1="410" x2="530" y2="410" stroke="#1a1a1a"/>

<text x="110" y="435" fill="#555" font-family="system-ui" font-size="13">Coste</text>
<text x="430" y="435" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">20$/mes</text>
<text x="110" y="465" fill="#555" font-family="system-ui" font-size="13">Retorno</text>
<text x="430" y="465" text-anchor="end" fill="#888" font-family="system-ui" font-size="13">Ahorro puntual</text>

<!-- Agente IA Column -->
<rect x="640" y="110" width="480" height="370" rx="14" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="880" y="150" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22" font-weight="700">Agente IA Personal</text>

<text x="670" y="190" fill="#555" font-family="system-ui" font-size="13">Memoria</text>
<text x="990" y="190" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">Permanente y estructurada</text>
<line x1="670" y1="200" x2="1090" y2="200" stroke="#1a1a1a"/>

<text x="670" y="225" fill="#555" font-family="system-ui" font-size="13">Proactividad</text>
<text x="990" y="225" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">Total (actua solo)</text>
<line x1="670" y1="235" x2="1090" y2="235" stroke="#1a1a1a"/>

<text x="670" y="260" fill="#555" font-family="system-ui" font-size="13">Integraciones</text>
<text x="990" y="260" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">Email, WhatsApp, CRM, todo</text>
<line x1="670" y1="270" x2="1090" y2="270" stroke="#1a1a1a"/>

<text x="670" y="295" fill="#555" font-family="system-ui" font-size="13">Privacidad</text>
<text x="990" y="295" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">100% en tu servidor</text>
<line x1="670" y1="305" x2="1090" y2="305" stroke="#1a1a1a"/>

<text x="670" y="330" fill="#555" font-family="system-ui" font-size="13">Autonomia</text>
<text x="990" y="330" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">Total (reglas + criterio)</text>
<line x1="670" y1="340" x2="1090" y2="340" stroke="#1a1a1a"/>

<text x="670" y="365" fill="#555" font-family="system-ui" font-size="13">Personalizacion</text>
<text x="990" y="365" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">Personalidad + skills + memoria</text>
<line x1="670" y1="375" x2="1090" y2="375" stroke="#1a1a1a"/>

<text x="670" y="400" fill="#555" font-family="system-ui" font-size="13">Trabaja 24/7</text>
<text x="990" y="400" text-anchor="end" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">Si, siempre activo</text>
<line x1="670" y1="410" x2="1090" y2="410" stroke="#1a1a1a"/>

<text x="670" y="435" fill="#555" font-family="system-ui" font-size="13">Coste</text>
<text x="990" y="435" text-anchor="end" fill="#fff" font-family="system-ui" font-size="13">10-30 EUR/mes</text>
<text x="670" y="465" fill="#555" font-family="system-ui" font-size="13">Retorno</text>
<text x="990" y="465" text-anchor="end" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">+3.000 EUR/mes en tiempo</text>

<!-- VS badge -->
<circle cx="600" cy="295" r="28" fill="#080808" stroke="#e94560" stroke-width="2"/>
<text x="600" y="302" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="18" font-weight="800">VS</text>

<!-- Footer -->
<text x="600" y="530" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="700">Agente IA personal vs ChatGPT: las diferencias reales</text>
<text x="600" y="555" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
