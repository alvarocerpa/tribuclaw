<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
<rect width="800" height="380" fill="#080808"/>
<rect x="20" y="20" width="760" height="340" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Title -->
<text x="400" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">Automatiza tu comunidad con un agente IA</text>

<!-- Central node -->
<circle cx="400" cy="190" r="50" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="400" y="185" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="700">AGENTE</text>
<text x="400" y="203" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">IA</text>

<!-- Satellite nodes -->
<!-- Top left -->
<line x1="360" y1="155" x2="200" y2="100" stroke="#333" stroke-width="1"/>
<rect x="100" y="75" width="200" height="50" rx="8" fill="#111" stroke="#1a1a1a"/>
<text x="200" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Bienvenida automatica</text>
<text x="200" y="116" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Mensaje personalizado a nuevos</text>

<!-- Top right -->
<line x1="440" y1="155" x2="600" y2="100" stroke="#333" stroke-width="1"/>
<rect x="500" y="75" width="200" height="50" rx="8" fill="#111" stroke="#1a1a1a"/>
<text x="600" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">FAQ automatico</text>
<text x="600" y="116" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Responde preguntas frecuentes</text>

<!-- Left -->
<line x1="350" y1="190" x2="210" y2="190" stroke="#333" stroke-width="1"/>
<rect x="60" y="165" width="150" height="50" rx="8" fill="#111" stroke="#1a1a1a"/>
<text x="135" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Resumen semanal</text>
<text x="135" y="206" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Digest automatico</text>

<!-- Right -->
<line x1="450" y1="190" x2="590" y2="190" stroke="#333" stroke-width="1"/>
<rect x="590" y="165" width="150" height="50" rx="8" fill="#111" stroke="#1a1a1a"/>
<text x="665" y="190" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Noticias IA</text>
<text x="665" y="206" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Curacion diaria</text>

<!-- Bottom left -->
<line x1="360" y1="225" x2="200" y2="280" stroke="#333" stroke-width="1"/>
<rect x="100" y="255" width="200" height="50" rx="8" fill="#111" stroke="#1a1a1a"/>
<text x="200" y="280" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Moderacion</text>
<text x="200" y="296" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Anti-spam + off-topic</text>

<!-- Bottom right -->
<line x1="440" y1="225" x2="600" y2="280" stroke="#333" stroke-width="1"/>
<rect x="500" y="255" width="200" height="50" rx="8" fill="#111" stroke="#1a1a1a"/>
<text x="600" y="280" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Onboarding</text>
<text x="600" y="296" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Guia paso a paso para nuevos</text>

<!-- Bottom note -->
<text x="400" y="340" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Con OpenClaw puedes montar esto en una tarde</text>
</svg>
