<text x="440" y="195" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">20 min producir</text>

<rect x="530" y="80" width="140" height="130" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
