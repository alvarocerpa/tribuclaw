<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
<rect width="800" height="420" fill="#080808"/>
<rect x="20" y="20" width="760" height="380" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Title -->
<text x="400" y="58" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">Calendario de contenido semanal</text>

