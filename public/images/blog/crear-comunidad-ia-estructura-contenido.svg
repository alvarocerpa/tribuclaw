<text x="440" y="130" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Recursos</text>
<text x="440" y="150" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Prompts, plantillas</text>
