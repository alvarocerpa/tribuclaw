    HERRAMIENTAS IA 2026
  </text>
  <text x="600" y="90" text-anchor="middle" fill="#888" font-family="system-ui" font-size="16">
    Guia para Emprendedores
  </text>
  
  <!-- Category Cards Row 1 -->
  <g transform="translate(80, 130)">
    <!-- Chat & Content -->
    <rect x="0" y="0" width="240" height="140" fill="#0d0d0d" stroke="#e94560" stroke-width="2" rx="8"/>
    <text x="120" y="35" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="700">CHATGPT</text>
    <text x="120" y="60" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Claude</text>
    <text x="120" y="80" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">Jasper</text>
    <text x="120" y="110" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">Contenido</text>
    
    <!-- Design -->
    <rect x="280" y="0" width="240" height="140" fill="#0d0d0d" stroke="#4a9eff" stroke-width="2" rx="8"/>
