    <text x="930" y="40" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="42" font-weight="700">24/7</text>
    <text x="930" y="70" text-anchor="middle" fill="#4a9eff" font-family="system-ui" font-size="16">disponible</text>
    <text x="930" y="95" text-anchor="middle" fill="#888" font-family="system-ui" font-size="14">sin descansos</text>
    <text x="930" y="130" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tu asistente virtual siempre activo</text>
  </g>
  
  <!-- Bottom CTA -->
