  <text x="600" y="522" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">EMPIEZA HOY - NO NECESITAS PROGRAMAR</text>
  
  <!-- Footer -->
  <text x="600" y="570" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
