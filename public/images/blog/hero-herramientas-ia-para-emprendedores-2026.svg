    <text x="170" y="40" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="42" font-weight="700">80%</text>
    <text x="170" y="70" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16">menos tiempo</text>
    <text x="170" y="95" text-anchor="middle" fill="#888" font-family="system-ui" font-size="14">en tareas administrativas</text>
    <text x="170" y="130" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">con las herramientas correctas</text>
    
