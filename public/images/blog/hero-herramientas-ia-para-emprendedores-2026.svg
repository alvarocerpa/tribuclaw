    <text x="400" y="60" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Canva AI</text>
    <text x="400" y="80" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">DALL-E</text>
    <text x="400" y="110" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">Diseno</text>
    
    <!-- Automation -->
    <rect x="560" y="0" width="240" height="140" fill="#0d0d0d" stroke="#22c55e" stroke-width="2" rx="8"/>
    <text x="680" y="35" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="20" font-weight="700">N8N</text>
    <text x="680" y="60" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Make</text>
    <text x="680" y="80" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">Zapier</text>
    <text x="680" y="110" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">Automatizacion</text>
    
    <!-- Video -->
    <rect x="840" y="0" width="240" height="140" fill="#0d0d0d" stroke="#a855f7" stroke-width="2" rx="8"/>
    <text x="960" y="35" text-anchor="middle" fill="#a855f7" font-family="system-ui" font-size="20" font-weight="700">RUNWAY</text>
    <text x="960" y="60" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">HeyGen</text>
    <text x="960" y="80" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">Pika</text>
    <text x="960" y="110" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">Video</text>
