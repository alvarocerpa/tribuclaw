<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />

  <!-- Grid pattern -->
  <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid5)" opacity="0.3" />

  <!-- Accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad5)" />

  <!-- Top right accent -->
  <path d="M 1200 0 L 1000 0 L 1200 200 Z" fill="#e94560" opacity="0.08" />

  <!-- Content area -->
  <g transform="translate(80, 160)">
    <!-- Money + AI illustration -->
    <g transform="translate(30, 10)">
      <!-- Rising graph with money -->
      <g transform="translate(20, 0)">
        <!-- Chart background -->
        <rect x="0" y="0" width="140" height="100" rx="8" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1.5" />

        <!-- Grid lines -->
        <line x1="0" y1="25" x2="140" y2="25" stroke="#1a1a1a" stroke-width="0.5" />
        <line x1="0" y1="50" x2="140" y2="50" stroke="#1a1a1a" stroke-width="0.5" />
        <line x1="0" y1="75" x2="140" y2="75" stroke="#1a1a1a" stroke-width="0.5" />
        <line x1="35" y1="0" x2="35" y2="100" stroke="#1a1a1a" stroke-width="0.5" />
        <line x1="70" y1="0" x2="70" y2="100" stroke="#1a1a1a" stroke-width="0.5" />
        <line x1="105" y1="0" x2="105" y2="100" stroke="#1a1a1a" stroke-width="0.5" />

        <!-- Rising line graph -->
        <path d="M 10 85 L 35 70 L 60 55 L 85 40 L 110 25 L 130 10" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" filter="url(#glow5)" />

        <!-- Area under curve -->
        <path d="M 10 85 L 35 70 L 60 55 L 85 40 L 110 25 L 130 10 L 130 100 L 10 100 Z" fill="#e94560" opacity="0.1" />

        <!-- Data points -->
        <circle cx="10" cy="85" r="3" fill="#e94560" />
        <circle cx="35" cy="70" r="3" fill="#e94560" />
        <circle cx="60" cy="55" r="3" fill="#e94560" />
        <circle cx="85" cy="40" r="3" fill="#e94560" />
        <circle cx="110" cy="25" r="3" fill="#e94560" />
        <circle cx="130" cy="10" r="4" fill="#e94560" filter="url(#glow5)" />
      </g>

      <!-- Coins/money symbols -->
      <g transform="translate(170, 30)">
        <!-- Coin 1 -->
        <g transform="translate(0, 0)">
          <circle cx="20" cy="20" r="18" fill="none" stroke="#e94560" stroke-width="2.5" />
          <text x="20" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e94560" text-anchor="middle" font-weight="700">€</text>
        </g>

        <!-- Coin 2 -->
        <g transform="translate(30, 30)">
          <circle cx="20" cy="20" r="18" fill="none" stroke="#e94560" stroke-width="2.5" />
          <text x="20" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#e94560" text-anchor="middle" font-weight="700">€</text>
        </g>

        <!-- AI sparkles near money -->
        <circle cx="70" cy="0" r="2" fill="#e94560" opacity="0.6" />
        <circle cx="75" cy="15" r="1.5" fill="#e94560" opacity="0.5" />
        <circle cx="65" cy="25" r="2" fill="#e94560" opacity="0.4" />
      </g>

      <!-- AI brain below -->
      <g transform="translate(60, 140)">
        <ellipse cx="50" cy="30" rx="45" ry="35" fill="none" stroke="#e94560" stroke-width="2" opacity="0.7" />
        <path d="M 20 30 Q 35 10 50 30 Q 65 50 80 30" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.6" />
        <path d="M 25 35 Q 40 20 50 35 Q 60 50 75 35" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5" />
        <text x="50" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#e94560" text-anchor="middle" opacity="0.8">AI POWERED</text>
      </g>
    </g>

    <!-- Title -->
    <text x="280" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e0e0e0" font-weight="700">Ganar Dinero</text>
    <text x="280" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e94560" font-weight="700">con IA</text>

    <!-- Subtitle -->
    <text x="280" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#888">
      Estrategias reales para monetizar la inteligencia artificial
    </text>

    <!-- Category tag -->
    <rect x="280" y="165" width="160" height="30" rx="4" fill="#e94560" opacity="0.2" />
    <text x="360" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">NEGOCIOS CON IA</text>

    <!-- Highlight bullets -->
    <g transform="translate(280, 220)">
      <circle cx="0" cy="0" r="3" fill="#e94560" />
      <text x="15" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Servicios de automatización</text>

      <circle cx="0" cy="25" r="3" fill="#e94560" />
      <text x="15" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Infoproductos con IA</text>

      <circle cx="0" cy="50" r="3" fill="#e94560" />
      <text x="15" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Consultoría e implementación</text>
    </g>
  </g>

  <!-- Bottom decoration -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a1a1a" stroke-width="1" />
  <rect x="0" y="620" width="1200" height="10" fill="#0a0a0a" />
  <circle cx="1150" cy="580" r="4" fill="#e94560" opacity="0.6" />
  <circle cx="1165" cy="580" r="3" fill="#e94560" opacity="0.4" />
  <circle cx="1178" cy="580" r="2" fill="#e94560" opacity="0.3" />
</svg>
