  <line x1="40" y1="128" x2="760" y2="128" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="40" y1="178" x2="760" y2="178" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="40" y1="228" x2="760" y2="228" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="40" y1="278" x2="760" y2="278" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="40" y1="328" x2="760" y2="328" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Col 1 data -->
  <text x="150" y="148" text-anchor="middle" fill="#cc4444" font-family="system-ui, sans-serif" font-size="12">Pago por conversacion</text>
  <text x="150" y="198" text-anchor="middle" fill="#cc4444" font-family="system-ui, sans-serif" font-size="12">Complejo, semanas</text>
  <text x="150" y="248" text-anchor="middle" fill="#cc4444" font-family="system-ui, sans-serif" font-size="12">Obligatoria + verificada</text>
