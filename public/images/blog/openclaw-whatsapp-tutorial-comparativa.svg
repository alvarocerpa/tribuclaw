  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" fill="#888888" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="2">COMPARATIVA DE METODOS</text>

  <!-- Column headers -->
  <!-- Col 1: API Oficial Meta -->
  <rect x="40" y="68" width="220" height="44" rx="8" fill="#1a0a0a" stroke="#3a1515" stroke-width="1.5"/>
