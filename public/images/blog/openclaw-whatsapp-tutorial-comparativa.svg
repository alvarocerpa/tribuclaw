  <text x="150" y="104" text-anchor="middle" fill="#666666" font-family="system-ui, sans-serif" font-size="11">Business API</text>

  <!-- Col 2: Twilio/360dialog -->
  <rect x="290" y="68" width="220" height="44" rx="8" fill="#12120a" stroke="#2a2a15" stroke-width="1.5"/>
