  <text x="150" y="348" text-anchor="middle" fill="#cc4444" font-family="system-ui, sans-serif" font-size="12">Segun plan contratado</text>

  <!-- Col 2 data -->
  <text x="400" y="148" text-anchor="middle" fill="#aaaa44" font-family="system-ui, sans-serif" font-size="12">0.004-0.08 eur/msg</text>
