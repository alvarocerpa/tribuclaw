  <text x="32" y="248" fill="#555555" font-family="system-ui, sans-serif" font-size="11" font-weight="600">CUENTA BUSINESS</text>
  <text x="32" y="298" fill="#555555" font-family="system-ui, sans-serif" font-size="11" font-weight="600">TIEMPO</text>
  <text x="32" y="348" fill="#555555" font-family="system-ui, sans-serif" font-size="11" font-weight="600">LIMITE MENSAJES</text>

