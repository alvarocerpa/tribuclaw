  <text x="400" y="298" text-anchor="middle" fill="#aaaa44" font-family="system-ui, sans-serif" font-size="12">1-7 dias</text>
  <text x="400" y="348" text-anchor="middle" fill="#aaaa44" font-family="system-ui, sans-serif" font-size="12">Alto (escala con $$$)</text>

  <!-- Col 3 data -->
  <text x="650" y="148" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="12" font-weight="600">GRATIS</text>
  <text x="650" y="198" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Simple, 20 minutos</text>
  <text x="650" y="248" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="12" font-weight="600">No necesaria</text>
  <text x="650" y="298" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="12" font-weight="600">20 minutos</text>
  <text x="650" y="348" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Uso personal normal</text>
