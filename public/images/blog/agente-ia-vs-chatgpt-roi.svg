<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
<rect width="800" height="380" fill="#080808"/>
<rect x="20" y="20" width="760" height="340" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<text x="400" y="55" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16" font-weight="700">COSTE vs RETORNO MENSUAL</text>

<!-- ChatGPT bar -->
<rect x="100" y="90" width="260" height="100" rx="12" fill="#111" stroke="#555"/>
<text x="230" y="120" text-anchor="middle" fill="#888" font-family="system-ui" font-size="16" font-weight="700">ChatGPT Plus</text>
<text x="230" y="148" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Coste: 20$/mes</text>
<text x="230" y="172" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Ahorro: variable (manual)</text>

<!-- Agent bar -->
<rect x="440" y="90" width="260" height="100" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="570" y="120" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16" font-weight="700">Agente IA</text>
<text x="570" y="148" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">Coste: 10-30 EUR/mes</text>
<text x="570" y="172" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="13" font-weight="600">Ahorro: +3.000 EUR/mes</text>

<!-- Calculation -->
<rect x="150" y="220" width="500" height="90" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="400" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">Si tu hora vale 50 EUR y el agente ahorra 2h/dia:</text>
<text x="400" y="278" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22" font-weight="800">50 x 2 x 30 = 3.000 EUR/mes</text>
<text x="400" y="298" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">ROI: 10.000% (coste 30 EUR, retorno 3.000 EUR)</text>

<text x="400" y="365" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">tribuclaw.com</text>
</svg>
