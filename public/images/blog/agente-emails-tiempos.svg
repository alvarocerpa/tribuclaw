<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
<rect width="800" height="400" fill="#080808"/>
<rect x="20" y="20" width="760" height="360" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Titulo -->
<text x="400" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="700">Ahorro de tiempo por perfil</text>

<!-- 4 perfiles -->
<!-- Perfil 1: Emprendedor -->
<rect x="60" y="85" width="160" height="130" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="140" y="115" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Emprendedor</text>
<text x="140" y="135" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Tienda online</text>
<text x="140" y="170" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="28" font-weight="700">-45 min</text>
<text x="140" y="195" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">diarios</text>

<!-- Perfil 2: Consultor -->
<rect x="240" y="85" width="160" height="130" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="320" y="115" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Consultor</text>
<text x="320" y="135" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">12 clientes</text>
<text x="320" y="170" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="28" font-weight="700">-60 min</text>
<text x="320" y="195" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">diarios</text>

<!-- Perfil 3: Agencia -->
<rect x="420" y="85" width="160" height="130" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="500" y="115" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Agencia</text>
<text x="500" y="135" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Marketing digital</text>
<text x="500" y="170" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="28" font-weight="700">-2 h</text>
<text x="500" y="195" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">filtrando leads</text>

<!-- Perfil 4: Freelance -->
<rect x="600" y="85" width="160" height="130" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="680" y="115" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Freelance</text>
<text x="680" y="135" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Odio el correo</text>
<text x="680" y="170" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="28" font-weight="700">6 a 2</text>
<text x="680" y="195" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">revisiones/dia</text>

<!-- Tabla comparativa -->
<rect x="100" y="235" width="600" height="130" rx="10" fill="#111" stroke="#1a1a1a"/>

<!-- Headers -->
<text x="180" y="265" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11" font-weight="600">Herramienta</text>
<text x="380" y="265" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11" font-weight="600">Funcion</text>
<text x="580" y="265" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11" font-weight="600">Coste/mes</text>

<line x1="120" y1="280" x2="680" y2="280" stroke="#1a1a1a" stroke-width="1"/>

<!-- Fila 1 -->
<text x="180" y="305" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">Superhuman</text>
<text x="380" y="305" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Cliente email con IA</text>
<text x="580" y="305" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11">30 USD</text>

<!-- Fila 2 -->
<text x="180" y="330" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">Gmail + Gemini</text>
<text x="380" y="330" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Resumenes basicos</text>
<text x="580" y="330" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11">20 USD</text>

<!-- Fila 3 -->
<text x="180" y="355" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">OpenClaw + skill</text>
<text x="380" y="355" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Agente IA completo</text>
<text x="580" y="355" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11" font-weight="600">6-11 EUR</text>

<text x="400" y="390" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">OpenClaw: mas barato y con control total</text>
</svg>