<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b8a"/>
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="800" height="400" fill="#080808"/>
  
  <!-- Contenedor -->
  <rect x="20" y="20" width="760" height="360" rx="12" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Titulo -->
  <text x="400" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="700">Tipos de Memoria en Agentes IA</text>
  
  <!-- Card 1: Sesion -->
  <rect x="40" y="80" width="170" height="130" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="2"/>
  <text x="125" y="110" text-anchor="middle" fill="#888" font-family="system-ui" font-size="14" font-weight="600">Sesion</text>
  <line x1="50" y1="125" x2="200" y2="125" stroke="#222" stroke-width="1"/>
  <text x="125" y="150" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">ChatGPT basico</text>
  <text x="125" y="170" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Solo conversacion actual</text>
  <text x="125" y="195" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="10">Se borra al cerrar</text>
  
  <!-- Card 2: Ventana -->
  <rect x="220" y="80" width="170" height="130" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="2"/>
  <text x="305" y="110" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="14" font-weight="600">Ventana</text>
  <line x1="230" y1="125" x2="380" y2="125" stroke="#222" stroke-width="1"/>
  <text x="305" y="150" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Ultimas N interacciones</text>
  <text x="305" y="170" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Contexto limitado</text>
  <text x="305" y="195" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="10">Pierde info antigua</text>
  
  <!-- Card 3: RAG -->
  <rect x="400" y="80" width="170" height="130" rx="8" fill="#0d0d0d" stroke="#555" stroke-width="2"/>
  <text x="485" y="110" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">RAG</text>
  <line x1="410" y1="125" x2="560" y2="125" stroke="#222" stroke-width="1"/>
  <text x="485" y="150" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Base de datos externa</text>
  <text x="485" y="170" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Busqueda inteligente</text>
  <text x="485" y="195" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="10">Memoria ilimitada</text>
  
  <!-- Card 4: Hibrida (destacada) -->
  <rect x="580" y="80" width="180" height="130" rx="8" fill="#0d0d0d" stroke="url(#accentGrad)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="700">Hibrida</text>
  <line x1="590" y1="125" x2="750" y2="125" stroke="#222" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Combina todo</text>
  <text x="670" y="170" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">OpenClaw approach</text>
  <text x="670" y="195" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="10">Optimo para agentes</text>
  
  <!-- Flecha de evolucion -->
  <line x1="210" y1="145" x2="220" y2="145" stroke="#333" stroke-width="2"/>
  <line x1="390" y1="145" x2="400" y2="145" stroke="#333" stroke-width="2"/>
  <line x1="570" y1="145" x2="580" y2="145" stroke="#e94560" stroke-width="2"/>
  
  <!-- Seccion inferior: comparativa -->
  <rect x="40" y="230" width="720" height="130" rx="8" fill="#0d0d0d" stroke="#222" stroke-width="1"/>
  
  <!-- Headers tabla -->
  <text x="140" y="260" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12" font-weight="600">Tipo</text>
  <text x="320" y="260" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12" font-weight="600">Capacidad</text>
  <text x="500" y="260" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12" font-weight="600">Persistencia</text>
  <text x="680" y="260" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12" font-weight="600">Complejidad</text>
  
  <line x1="50" y1="275" x2="750" y2="275" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Fila 1 -->
  <text x="140" y="300" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Sesion</text>
  <text x="320" y="300" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">8-32K tokens</text>
  <text x="500" y="300" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11">Ninguna</text>
  <text x="680" y="300" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="11">Baja</text>
  
  <!-- Fila 2 -->
  <text x="140" y="325" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="11">RAG</text>
  <text x="320" y="325" text-anchor="middle" fill="#aaa" font-family="system-ui" font-size="11">Ilimitada</text>
  <text x="500" y="325" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="11">Total</text>
  <text x="680" y="325" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="11">Media</text>
  
  <!-- Fila 3 (destacada) -->
  <text x="140" y="350" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11" font-weight="600">Hibrida</text>
  <text x="320" y="350" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11">Ilimitada</text>
  <text x="500" y="350" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="11">Total + selectiva</text>
  <text x="680" y="350" text-anchor="middle" fill="#fbbf24" font-family="system-ui" font-size="11">Media-Alta</text>
</svg>
