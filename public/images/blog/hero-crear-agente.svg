<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
<rect width="1200" height="630" fill="#080808"/>
<rect x="40" y="40" width="1120" height="550" rx="20" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- 6 step cards in 2 rows -->
<!-- Row 1 -->
<rect x="80" y="90" width="320" height="120" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="110" y="145" fill="#e94560" font-family="system-ui" font-size="32">🖥️</text>
<text x="155" y="135" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">PASO 1</text>
<text x="155" y="158" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Servidor VPS</text>
<text x="155" y="178" fill="#666" font-family="system-ui" font-size="11">Ubuntu + 5€/mes</text>

<rect x="440" y="90" width="320" height="120" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="470" y="145" fill="#e94560" font-family="system-ui" font-size="32">⚙️</text>
<text x="515" y="135" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">PASO 2</text>
<text x="515" y="158" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Instalar OpenClaw</text>
<text x="515" y="178" fill="#666" font-family="system-ui" font-size="11">curl | bash → 3 min</text>

<rect x="800" y="90" width="320" height="120" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="830" y="145" fill="#e94560" font-family="system-ui" font-size="32">🧬</text>
<text x="875" y="135" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">PASO 3</text>
<text x="875" y="158" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Personalidad</text>
<text x="875" y="178" fill="#666" font-family="system-ui" font-size="11">SOUL.md → tu estilo</text>

<!-- Row 2 -->
<rect x="80" y="240" width="320" height="120" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="110" y="295" fill="#e94560" font-family="system-ui" font-size="32">🔗</text>
<text x="155" y="285" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">PASO 4</text>
<text x="155" y="308" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Conectar herramientas</text>
<text x="155" y="328" fill="#666" font-family="system-ui" font-size="11">WhatsApp, Email, CRM...</text>

<rect x="440" y="240" width="320" height="120" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="470" y="295" fill="#e94560" font-family="system-ui" font-size="32">💾</text>
<text x="515" y="285" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">PASO 5</text>
<text x="515" y="308" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Memoria permanente</text>
<text x="515" y="328" fill="#666" font-family="system-ui" font-size="11">Recuerda todo, aprende</text>

<rect x="800" y="240" width="320" height="120" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="830" y="295" fill="#e94560" font-family="system-ui" font-size="32">🚀</text>
<text x="875" y="285" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">PASO 6</text>
<text x="875" y="308" fill="#fff" font-family="system-ui" font-size="16" font-weight="600">Lanzar 24/7</text>
<text x="875" y="328" fill="#666" font-family="system-ui" font-size="11">Trabaja mientras duermes</text>

<!-- Arrows connecting steps -->
<line x1="400" y1="150" x2="440" y2="150" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
<line x1="760" y1="150" x2="800" y2="150" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
<line x1="400" y1="300" x2="440" y2="300" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
<line x1="760" y1="300" x2="800" y2="300" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
<line x1="1050" y1="210" x2="1050" y2="240" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>

<!-- Result box -->
<rect x="300" y="400" width="600" height="80" rx="12" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="600" y="435" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="24" font-weight="800">De cero a agente IA en 1 hora</text>
<text x="600" y="460" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Sin programar · Open source · Tu servidor</text>

<!-- Title -->
<text x="600" y="535" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="700">Crea tu propio agente IA desde cero</text>
<text x="600" y="560" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
