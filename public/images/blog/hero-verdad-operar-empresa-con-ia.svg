<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#1a1a1a" rx="12"/>

  <text x="600" y="68" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="30" font-weight="700">LA VERDAD SOBRE OPERAR TU EMPRESA CON IA</text>
  <text x="600" y="96" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="15">Lo que nadie cuenta. Sin hype.</text>

  <!-- Fila superior: 3 stats de realidad -->
  <g transform="translate(60, 120)">
    <!-- Stat 1: Tasa de error -->
    <rect x="0" y="0" width="320" height="150" fill="#1a0808" stroke="#e94560" stroke-width="1.5" rx="10"/>
    <text x="160" y="42" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="42" font-weight="900">5-15%</text>
    <text x="160" y="70" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">Tasa de error real</text>
    <text x="160" y="92" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">en tareas complejas</text>
    <text x="160" y="112" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">No es magia. Falla.</text>
    <text x="160" y="132" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Hay que disenar bien.</text>

    <!-- Stat 2: Tiempo real -->
    <rect x="360" y="0" width="320" height="150" fill="#0a0d1a" stroke="#4a9eff" stroke-width="1.5" rx="10"/>
    <text x="520" y="42" text-anchor="middle" fill="#4a9eff" font-family="system-ui" font-size="42" font-weight="900">2-3</text>
    <text x="520" y="68" text-anchor="middle" fill="#4a9eff" font-family="system-ui" font-size="22" font-weight="700">meses</text>
    <text x="520" y="92" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">Para estabilizar</text>
    <text x="520" y="112" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">No un fin de semana</text>
    <text x="520" y="132" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Es infraestructura.</text>

    <!-- Stat 3: Coste real -->
    <rect x="720" y="0" width="320" height="150" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5" rx="10"/>
    <text x="880" y="42" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="32" font-weight="900">200-800</text>
    <text x="880" y="68" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="20" font-weight="700">EUR/mes</text>
    <text x="880" y="92" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">Coste sistema avanzado</text>
    <text x="880" y="112" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">No gratis. Pero rentable.</text>
    <text x="880" y="132" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">vs 2.000 EUR/empleado.</text>
  </g>

  <!-- Fila inferior: ROI real -->
  <g transform="translate(60, 300)">
    <rect x="0" y="0" width="500" height="160" fill="#0d0d0d" stroke="#1a1a1a" rx="10"/>
    <text x="250" y="35" text-anchor="middle" fill="#888" font-family="system-ui" font-size="14">Lo que el hype dice</text>
    <text x="250" y="65" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Automatizacion total en 24h</text>
    <text x="250" y="85" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Factura solo sin intervencion</text>
    <text x="250" y="105" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Practicamente gratis</text>
    <text x="250" y="125" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Sin conocimientos tecnicos</text>

    <rect x="540" y="0" width="500" height="160" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5" rx="10"/>
    <text x="790" y="35" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="14" font-weight="600">La realidad (pero sigue mereciendo la pena)</text>
    <text x="790" y="65" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">2-3 meses para estabilizar</text>
    <text x="790" y="85" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">ROI mensual neto: 2.600+ EUR</text>
    <text x="790" y="105" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">200-400 EUR de coste mensual</text>
    <text x="790" y="125" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">Curva de aprendizaje real</text>
  </g>

  <rect x="80" y="490" width="1040" height="50" fill="#e94560" rx="6"/>
  <text x="600" y="522" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="17" font-weight="700">LA GUIA HONESTA ESTA EN TRIBUCLAW.COM</text>

  <text x="600" y="580" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
