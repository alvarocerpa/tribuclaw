<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="800" height="350" fill="#080808"/>
  <rect x="20" y="20" width="760" height="310" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="2" rx="8"/>
  
  <!-- Título -->
  <text x="400" y="50" text-anchor="middle" fill="#e94560" font-size="16" font-weight="600">RESULTADOS REALES DE AUTOMATIZACIÓN</text>
  
  <!-- Caso 1: Freelancer -->
  <g>
    <rect x="60" y="80" width="200" height="200" fill="#1a1a1a" stroke="#4ade80" stroke-width="2" rx="8"/>
    <text x="160" y="105" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">CONSULTOR FREELANCE</text>
    
    <text x="80" y="130" fill="#888" font-size="11">ANTES:</text>
    <text x="80" y="145" fill="#fff" font-size="10">• 3h/día en emails</text>
    <text x="80" y="160" fill="#fff" font-size="10">• Respuestas lentas</text>
    <text x="80" y="175" fill="#fff" font-size="10">• Consultas repetitivas</text>
    
    <text x="80" y="200" fill="#888" font-size="11">DESPUÉS:</text>
    <text x="80" y="215" fill="#4ade80" font-size="10">• 45min/día en emails</text>
    <text x="80" y="230" fill="#4ade80" font-size="10">• Respuesta en 2min</text>
    <text x="80" y="245" fill="#4ade80" font-size="10">• 85% automatizado</text>
    
    <text x="160" y="270" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="700">+2h15min</text>
    <text x="160" y="285" text-anchor="middle" fill="#888" font-size="11">tiempo libre diario</text>
  </g>
  
  <!-- Caso 2: Agencia -->
  <g>
    <rect x="300" y="80" width="200" height="200" fill="#1a1a1a" stroke="#f59e0b" stroke-width="2" rx="8"/>
    <text x="400" y="105" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="600">AGENCIA MARKETING</text>
    
    <text x="320" y="130" fill="#888" font-size="11">ANTES:</text>
    <text x="320" y="145" fill="#fff" font-size="10">• 1 coordinador/40 clientes</text>
    <text x="320" y="160" fill="#fff" font-size="10">• Gestión manual</text>
    <text x="320" y="175" fill="#fff" font-size="10">• Retrasos frecuentes</text>
    
    <text x="320" y="200" fill="#888" font-size="11">DESPUÉS:</text>
    <text x="320" y="215" fill="#f59e0b" font-size="10">• 1 coordinador/80 clientes</text>
    <text x="320" y="230" fill="#f59e0b" font-size="10">• Reportes automáticos</text>
    <text x="320" y="245" fill="#f59e0b" font-size="10">• Comunicación fluida</text>
    
    <text x="400" y="270" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="700">+100%</text>
    <text x="400" y="285" text-anchor="middle" fill="#888" font-size="11">capacidad clientes</text>
  </g>
  
  <!-- Caso 3: E-commerce -->
  <g>
    <rect x="540" y="80" width="200" height="200" fill="#1a1a1a" stroke="#8b5cf6" stroke-width="2" rx="8"/>
    <text x="640" y="105" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="600">E-COMMERCE</text>
    
    <text x="560" y="130" fill="#888" font-size="11">ANTES:</text>
    <text x="560" y="145" fill="#fff" font-size="10">• 200 consultas/día</text>
    <text x="560" y="160" fill="#fff" font-size="10">• 4h tiempo respuesta</text>
    <text x="560" y="175" fill="#fff" font-size="10">• Soporte saturado</text>
    
    <text x="560" y="200" fill="#888" font-size="11">DESPUÉS:</text>
    <text x="560" y="215" fill="#8b5cf6" font-size="10">• 70% auto-resuelto</text>
    <text x="560" y="230" fill="#8b5cf6" font-size="10">• 15min tiempo respuesta</text>
    <text x="560" y="245" fill="#8b5cf6" font-size="10">• Satisfacción 94%</text>
    
    <text x="640" y="270" text-anchor="middle" fill="#8b5cf6" font-size="16" font-weight="700">-94%</text>
    <text x="640" y="285" text-anchor="middle" fill="#888" font-size="11">tiempo respuesta</text>
  </g>
  
  <!-- ROI general -->
  <text x="400" y="320" text-anchor="middle" fill="#e94560" font-size="12" font-weight="600">ROI PROMEDIO: Inversión de 50€/mes → Ahorro de 15h/semana (600€+ en tiempo)</text>
</svg>