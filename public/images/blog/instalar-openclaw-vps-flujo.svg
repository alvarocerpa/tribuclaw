<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
<rect width="800" height="380" fill="#080808"/>
<rect x="20" y="20" width="760" height="340" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<text x="400" y="55" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16" font-weight="700">FLUJO DE INSTALACION</text>

<!-- Step 1: npm install -->
<rect x="40" y="80" width="160" height="70" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="120" y="108" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22">📦</text>
<text x="120" y="132" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">npm install -g openclaw</text>

<!-- Arrow -->
<line x1="200" y1="115" x2="230" y2="115" stroke="#e94560" stroke-width="2"/>
<polygon points="228,110 238,115 228,120" fill="#e94560"/>

<!-- Step 2: openclaw init -->
<rect x="240" y="80" width="160" height="70" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="320" y="108" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22">⚡</text>
<text x="320" y="132" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">openclaw init</text>

<!-- Arrow -->
<line x1="400" y1="115" x2="430" y2="115" stroke="#e94560" stroke-width="2"/>
<polygon points="428,110 438,115 428,120" fill="#e94560"/>

<!-- Step 3: config -->
<rect x="440" y="80" width="160" height="70" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="520" y="108" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22">🔧</text>
<text x="520" y="132" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">Modelo + API Key</text>

<!-- Arrow -->
<line x1="600" y1="115" x2="630" y2="115" stroke="#e94560" stroke-width="2"/>
<polygon points="628,110 638,115 628,120" fill="#e94560"/>

<!-- Step 4: canal -->
<rect x="640" y="80" width="130" height="70" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="705" y="108" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22">📱</text>
<text x="705" y="132" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">Telegram/WhatsApp</text>

<!-- Arrow down from canal -->
<line x1="705" y1="150" x2="705" y2="180" stroke="#e94560" stroke-width="2"/>
<polygon points="700,178 705,188 710,178" fill="#e94560"/>

<!-- Step 5: gateway start -->
<rect x="580" y="190" width="190" height="70" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="675" y="218" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22">🚀</text>
<text x="675" y="245" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">openclaw gateway start</text>

<!-- Arrow -->
<line x1="580" y1="225" x2="550" y2="225" stroke="#e94560" stroke-width="2"/>
<polygon points="552,220 542,225 552,230" fill="#e94560"/>

<!-- Step 6: systemd -->
<rect x="360" y="190" width="190" height="70" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="455" y="218" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22">🔄</text>
<text x="455" y="245" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">systemd service (24/7)</text>

<!-- Arrow -->
<line x1="360" y1="225" x2="330" y2="225" stroke="#e94560" stroke-width="2"/>
<polygon points="332,220 322,225 332,230" fill="#e94560"/>

<!-- Result -->
<rect x="80" y="190" width="240" height="70" rx="10" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="200" y="218" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="18" font-weight="700">AGENTE IA ACTIVO</text>
<text x="200" y="240" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Funcionando 24/7 en tu VPS</text>

<!-- Bottom note -->
<text x="400" y="310" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">Tiempo total: 15-30 minutos</text>
<text x="400" y="340" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">tribuclaw.com</text>
