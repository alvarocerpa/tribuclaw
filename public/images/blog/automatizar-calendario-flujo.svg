<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <!-- Fondo -->
  <rect width="800" height="340" fill="#080808"/>
  <rect x="12" y="12" width="776" height="316" rx="10" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Título -->
  <text x="400" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#e94560" text-anchor="middle" letter-spacing="2">FLUJO DE AUTOMATIZACION DE CALENDARIO CON IA</text>

  <!-- Nodo 1 -->
  <rect x="30" y="80" width="150" height="70" rx="8" fill="#111" stroke="#e94560" stroke-width="1.5"/>
  <text x="105" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#e94560" text-anchor="middle">SOLICITUD</text>
  <text x="105" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Alguien pide reunion</text>
  <text x="105" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">email / chat / voz</text>

  <!-- Flecha 1-2 -->
  <line x1="180" y1="115" x2="218" y2="115" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Nodo 2 -->
  <rect x="218" y="80" width="165" height="70" rx="8" fill="#111" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="300" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#e94560" text-anchor="middle">AGENTE REVISA</text>
  <text x="300" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Disponibilidad + reglas</text>
  <text x="300" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">Google Calendar API</text>

  <!-- Flecha 2-3 -->
  <line x1="383" y1="115" x2="418" y2="115" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Nodo 3 -->
  <rect x="418" y="80" width="165" height="70" rx="8" fill="#111" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="500" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#e94560" text-anchor="middle">PROPONE HUECO</text>
  <text x="500" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Respuesta automatica</text>
  <text x="500" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">con opciones reales</text>

  <!-- Flecha 3-4 -->
  <line x1="583" y1="115" x2="618" y2="115" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Nodo 4 -->
  <rect x="618" y="80" width="155" height="70" rx="8" fill="#111" stroke="#1e1e1e" stroke-width="1.5"/>
  <text x="695" y="107" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#e94560" text-anchor="middle">CREA EVENTO</text>
  <text x="695" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Invita + notifica</text>
  <text x="695" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666" text-anchor="middle">todo automatico</text>

  <!-- Segunda fila: antes vs despues -->
  <text x="400" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#555" text-anchor="middle">ANTES vs DESPUES DE LA AUTOMATIZACION</text>

  <!-- Antes -->
  <rect x="30" y="210" width="350" height="90" rx="8" fill="#120808" stroke="#331111" stroke-width="1"/>
  <text x="205" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#cc3333" text-anchor="middle">SIN AGENTE IA</text>
  <text x="205" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">4-9 emails para cuadrar 1 reunion</text>
  <text x="205" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Revision manual de agenda cada manana</text>
  <text x="205" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Conflictos descubiertos en el ultimo momento</text>

  <!-- Despues -->
  <rect x="420" y="210" width="350" height="90" rx="8" fill="#081208" stroke="#113311" stroke-width="1"/>
  <text x="595" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#33cc66" text-anchor="middle">CON AGENTE IA</text>
  <text x="595" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">0 emails · la otra persona elige y se crea solo</text>
  <text x="595" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Briefing automatico a las 7:30 en Telegram</text>
  <text x="595" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Deteccion y resolucion proactiva</text>

  <!-- Branding -->
  <text x="400" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#444" text-anchor="middle">tribuclaw.com</text>
</svg>
