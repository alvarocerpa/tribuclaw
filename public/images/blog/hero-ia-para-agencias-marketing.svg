<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subtleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3" />

  <!-- Accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGradient)" />

  <!-- Decorative tech elements -->
  <!-- Top right corner accent -->
  <path d="M 1200 0 L 1000 0 L 1200 200 Z" fill="#e94560" opacity="0.1" />
  <circle cx="1120" cy="80" r="3" fill="#e94560" opacity="0.5" />
  <circle cx="1140" cy="60" r="2" fill="#e94560" opacity="0.4" />
  <circle cx="1100" cy="100" r="1.5" fill="#e94560" opacity="0.3" />

  <!-- Bottom decorative line -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a1a1a" stroke-width="1" />
  <rect x="0" y="620" width="1200" height="10" fill="#0a0a0a" />

  <!-- Content area -->
  <g transform="translate(80, 180)">
    <!-- Agency automation illustration -->
    <g transform="translate(10, 10)">
      <!-- Central AI Agent hub -->
      <circle cx="100" cy="100" r="40" fill="url(#accentGradient)" opacity="0.2"/>
      <circle cx="100" cy="100" r="30" fill="#0a0a0a" stroke="#e94560" stroke-width="2"/>
      <text x="100" y="105" font-family="system-ui, sans-serif" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">AI</text>

      <!-- Client 1 - Top left -->
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="12" fill="none" stroke="#e94560" stroke-width="1.5"/>
      <path d="M 20 100 L 20 45" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,2"/>
      <circle cx="20" cy="48" r="3" fill="#e94560"/>

      <!-- Client 2 - Top right -->
      <rect x="160" y="0" width="40" height="40" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5"/>
      <rect x="13" y="13" width="14" height="14" fill="none" stroke="#e94560" stroke-width="1.5"/>
      <path d="M 100 100 L 180 45" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,2"/>
      <circle cx="165" cy="48" r="3" fill="#e94560"/>

      <!-- Client 3 - Bottom left -->
      <rect x="0" y="160" width="40" height="40" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5"/>
      <polygon points="20,12 28,28 12,28" fill="none" stroke="#e94560" stroke-width="1.5"/>
      <path d="M 100 100 L 20 155" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,2"/>
      <circle cx="40" cy="145" r="3" fill="#e94560"/>

      <!-- Client 4 - Bottom right -->
      <rect x="160" y="160" width="40" height="40" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5"/>
      <line x1="13" y1="13" x2="27" y2="27" stroke="#e94560" stroke-width="1.5"/>
      <line x1="27" y1="13" x2="13" y2="27" stroke="#e94560" stroke-width="1.5"/>
      <path d="M 100 100 L 180 155" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,2"/>
      <circle cx="160" cy="145" r="3" fill="#e94560"/>

      <!-- Growth chart -->
      <g transform="translate(50, 170)">
        <rect x="0" y="0" width="100" height="50" rx="4" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>
        <line x1="10" y1="40" x2="10" y2="10" stroke="#888" stroke-width="1"/>
        <line x1="10" y1="40" x2="90" y2="40" stroke="#888" stroke-width="1"/>
        <path d="M 15 35 L 30 30 L 45 25 L 60 15 L 75 12 L 85 5" stroke="#e94560" stroke-width="2" fill="none"/>
        <circle cx="85" cy="5" r="3" fill="#e94560"/>
      </g>

      <!-- Time saved indicator -->
      <g transform="translate(130, 60)">
        <circle cx="25" cy="20" r="18" fill="#e94560" opacity="0.2"/>
        <text x="25" y="25" font-family="system-ui, sans-serif" font-size="14" fill="#e94560" text-anchor="middle" font-weight="bold">5x</text>
      </g>

      <!-- Connected lines pulse -->
      <circle cx="60" cy="72" r="5" fill="#e94560" opacity="0.4"/>
      <circle cx="60" cy="72" r="8" fill="#e94560" opacity="0.2"/>
    </g>

    <!-- Title -->
    <text x="280" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#e0e0e0" font-weight="600">IA para Agencias Marketing</text>

    <!-- Subtitle -->
    <text x="280" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#e94560" font-weight="500">5 Automatizaciones Que Ahorran Tiempo</text>

    <!-- Description -->
    <text x="280" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Escala sin duplicar tu equipo</text>

    <!-- Category tag -->
    <rect x="280" y="115" width="130" height="28" rx="4" fill="#e94560" opacity="0.2" />
    <text x="345" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="500">AGENCIAS</text>
  </g>

  <!-- Bottom right accent dots -->
  <circle cx="1150" cy="580" r="4" fill="#e94560" opacity="0.6" />
  <circle cx="1165" cy="580" r="3" fill="#e94560" opacity="0.4" />
  <circle cx="1178" cy="580" r="2" fill="#e94560" opacity="0.3" />
</svg>
