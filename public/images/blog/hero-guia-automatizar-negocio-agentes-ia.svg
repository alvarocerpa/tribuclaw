<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />

  <!-- Grid pattern -->
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid2)" opacity="0.3" />

  <!-- Accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad2)" />

  <!-- Top right accent -->
  <path d="M 1200 0 L 1000 0 L 1200 200 Z" fill="#e94560" opacity="0.08" />

  <!-- Content area -->
  <g transform="translate(80, 130)">
    <!-- Automation pipeline illustration -->
    <g transform="translate(20, 10)">
      <!-- Step 1: Input -->
      <rect x="0" y="30" width="50" height="50" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5" />
      <text x="25" y="60" font-family="system-ui, sans-serif" font-size="20" fill="#e94560" text-anchor="middle">1</text>

      <!-- Arrow -->
      <line x1="55" y1="55" x2="80" y2="55" stroke="#e94560" stroke-width="2" opacity="0.6" />
      <polygon points="80,50 90,55 80,60" fill="#e94560" opacity="0.6" />

      <!-- Step 2: Agent -->
      <rect x="90" y="20" width="60" height="70" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="2" />
      <text x="120" y="45" font-family="system-ui, sans-serif" font-size="10" fill="#e94560" text-anchor="middle" font-weight="600">AGENTE</text>
      <text x="120" y="65" font-family="system-ui, sans-serif" font-size="16" fill="#e94560" text-anchor="middle">IA</text>
      <!-- Gear icon -->
      <circle cx="120" cy="78" r="6" fill="none" stroke="#e94560" stroke-width="1" opacity="0.5" />

      <!-- Arrow -->
      <line x1="155" y1="55" x2="180" y2="55" stroke="#e94560" stroke-width="2" opacity="0.6" />
      <polygon points="180,50 190,55 180,60" fill="#e94560" opacity="0.6" />

      <!-- Step 3: Output -->
      <rect x="190" y="30" width="50" height="50" rx="8" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5" />
      <text x="215" y="55" font-family="system-ui, sans-serif" font-size="14" fill="#e94560" text-anchor="middle">&#10003;</text>

      <!-- Server rack below -->
      <g transform="translate(30, 110)">
        <rect x="0" y="0" width="180" height="14" rx="3" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1" />
        <circle cx="170" cy="7" r="3" fill="#e94560" opacity="0.8" />
        <rect x="0" y="18" width="180" height="14" rx="3" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1" />
        <circle cx="170" cy="25" r="3" fill="#e94560" opacity="0.6" />
        <rect x="0" y="36" width="180" height="14" rx="3" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1" />
        <circle cx="170" cy="43" r="3" fill="#e94560" opacity="0.4" />
        <text x="90" y="72" font-family="system-ui, sans-serif" font-size="11" fill="#555" text-anchor="middle">VPS + OpenClaw</text>
      </g>
    </g>

    <!-- Title -->
    <text x="300" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="34" fill="#e0e0e0" font-weight="700">Automatiza tu Negocio</text>
    <text x="300" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="34" fill="#e94560" font-weight="700">con Agentes IA</text>

    <!-- Subtitle -->
    <text x="300" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#888">
      Guia paso a paso: del VPS al primer agente funcionando
    </text>

    <!-- Category tag -->
    <rect x="300" y="155" width="120" height="30" rx="4" fill="#e94560" opacity="0.2" />
    <text x="360" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">TUTORIAL</text>

    <!-- Highlight bullets -->
    <g transform="translate(300, 210)">
      <circle cx="0" cy="0" r="3" fill="#e94560" />
      <text x="15" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">OpenClaw paso a paso</text>

      <circle cx="0" cy="25" r="3" fill="#e94560" />
      <text x="15" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Sin suscripciones caras</text>

      <circle cx="0" cy="50" r="3" fill="#e94560" />
      <text x="15" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Agentes autonomos reales</text>
    </g>
  </g>

  <!-- Bottom decoration -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a1a1a" stroke-width="1" />
  <rect x="0" y="620" width="1200" height="10" fill="#0a0a0a" />
  <circle cx="1150" cy="580" r="4" fill="#e94560" opacity="0.6" />
  <circle cx="1165" cy="580" r="3" fill="#e94560" opacity="0.4" />
  <circle cx="1178" cy="580" r="2" fill="#e94560" opacity="0.3" />
</svg>