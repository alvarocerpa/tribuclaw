<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="calGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Calendar body -->
  <rect x="10" y="12" width="44" height="42" rx="4" fill="none" stroke="url(#calGrad)" stroke-width="2.5" />

  <!-- Header -->
  <rect x="10" y="12" width="44" height="12" rx="4" fill="#e94560" opacity="0.15" />
  <line x1="10" y1="24" x2="54" y2="24" stroke="url(#calGrad)" stroke-width="2" />

  <!-- Top rings -->
  <circle cx="20" cy="8" r="3" fill="none" stroke="url(#calGrad)" stroke-width="2" />
  <circle cx="44" cy="8" r="3" fill="none" stroke="url(#calGrad)" stroke-width="2" />

  <!-- Grid lines -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="#1a1a1a" stroke-width="1" />
  <line x1="10" y1="40" x2="54" y2="40" stroke="#1a1a1a" stroke-width="1" />
  <line x1="24" y1="24" x2="24" y2="54" stroke="#1a1a1a" stroke-width="1" />
  <line x1="38" y1="24" x2="38" y2="54" stroke="#1a1a1a" stroke-width="1" />

  <!-- Highlighted date -->
  <circle cx="44" cy="46" r="6" fill="#e94560" />
  <line x1="42" y1="46" x2="46" y2="46" stroke="#050505" stroke-width="1.5" stroke-linecap="round" />
  <line x1="44" y1="44" x2="44" y2="48" stroke="#050505" stroke-width="1.5" stroke-linecap="round" />
</svg>
