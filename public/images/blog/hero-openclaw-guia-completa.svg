<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />

  <!-- Grid pattern -->
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid2)" opacity="0.3" />

  <!-- Accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad2)" />

  <!-- Top right accent -->
  <path d="M 1200 0 L 1000 0 L 1200 200 Z" fill="#e94560" opacity="0.08" />

  <!-- Content area -->
  <g transform="translate(80, 160)">
    <!-- OpenClaw claw icon -->
    <g transform="translate(30, 10)">
      <!-- Claw shape -->
      <g transform="translate(90, 0)">
        <!-- Central palm -->
        <path d="M 0 80 Q 15 50 30 80 L 30 130 Q 15 145 0 130 Z" fill="none" stroke="#e94560" stroke-width="3" />

        <!-- Left claw -->
        <path d="M 0 90 Q -30 70 -40 30 Q -35 10 -20 15 Q -10 40 0 75" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" />
        <circle cx="-20" cy="15" r="4" fill="#e94560" filter="url(#glow2)" />

        <!-- Right claw -->
        <path d="M 0 90 Q 30 70 40 30 Q 35 10 20 15 Q 10 40 0 75" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" />
        <circle cx="20" cy="15" r="4" fill="#e94560" filter="url(#glow2)" />

        <!-- Top small claw -->
        <path d="M 15 55 Q 15 25 0 10 Q -15 25 -15 55" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" />
        <circle cx="0" cy="8" r="3" fill="#e94560" filter="url(#glow2)" />

        <!-- Code brackets decoration -->
        <text x="0" y="170" font-family="monospace" font-size="20" fill="#e94560" opacity="0.6" text-anchor="middle">&lt;/&gt;</text>
      </g>

      <!-- Terminal window -->
      <g transform="translate(20, 180)">
        <rect x="0" y="0" width="160" height="60" rx="6" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1.5" />
        <circle cx="12" cy="12" r="4" fill="#e94560" opacity="0.5" />
        <circle cx="25" cy="12" r="4" fill="#e94560" opacity="0.3" />
        <circle cx="38" cy="12" r="4" fill="#e94560" opacity="0.2" />
        <text x="15" y="35" font-family="monospace" font-size="10" fill="#e0e0e0">$ openclaw init</text>
        <text x="15" y="48" font-family="monospace" font-size="10" fill="#888">Starting...</text>
      </g>
    </g>

    <!-- Title -->
    <text x="280" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e0e0e0" font-weight="700">OpenClaw:</text>
    <text x="280" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e94560" font-weight="700">Guía Completa</text>

    <!-- Subtitle -->
    <text x="280" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#888">
      De cero a experto en automatización con agentes IA
    </text>

    <!-- Category tag -->
    <rect x="280" y="165" width="130" height="30" rx="4" fill="#e94560" opacity="0.2" />
    <text x="345" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">OPENCLAW</text>

    <!-- Highlight bullets -->
    <g transform="translate(280, 220)">
      <circle cx="0" cy="0" r="3" fill="#e94560" />
      <text x="15" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Instalación y configuración</text>

      <circle cx="0" cy="25" r="3" fill="#e94560" />
      <text x="15" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Tus primeros agentes</text>

      <circle cx="0" cy="50" r="3" fill="#e94560" />
      <text x="15" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Casos de uso reales</text>
    </g>
  </g>

  <!-- Bottom decoration -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a1a1a" stroke-width="1" />
  <rect x="0" y="620" width="1200" height="10" fill="#0a0a0a" />
  <circle cx="1150" cy="580" r="4" fill="#e94560" opacity="0.6" />
  <circle cx="1165" cy="580" r="3" fill="#e94560" opacity="0.4" />
  <circle cx="1178" cy="580" r="2" fill="#e94560" opacity="0.3" />
</svg>
