  <text x="550" y="78" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12" font-weight="700">BAJO COSTE</text>
  <text x="720" y="78" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12" font-weight="700">PRO</text>
  
