<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
<rect width="1200" height="630" fill="#080808"/>
<rect x="40" y="40" width="1120" height="550" rx="20" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Central hub -->
<rect x="430" y="160" width="340" height="120" rx="16" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="600" y="205" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16" font-weight="700">OPENCLAW AGENT</text>
<text x="600" y="230" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">Carga skills al inicio de sesion</text>
<text x="600" y="255" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Filtra por gating automatico</text>

<!-- Left skills column -->
<rect x="80" y="90" width="280" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="100" y="120" fill="#e94560" font-family="system-ui" font-size="13" font-weight="600">1. Workspace skills</text>
<text x="260" y="120" fill="#888" font-family="system-ui" font-size="11">Prioridad ALTA</text>

<rect x="80" y="160" width="280" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="100" y="190" fill="#e94560" font-family="system-ui" font-size="13" font-weight="600">2. Skills locales</text>
<text x="260" y="190" fill="#888" font-family="system-ui" font-size="11">~/.openclaw/skills</text>

<rect x="80" y="230" width="280" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="100" y="260" fill="#e94560" font-family="system-ui" font-size="13" font-weight="600">3. Skills incluidas</text>
<text x="260" y="260" fill="#888" font-family="system-ui" font-size="11">Prioridad BAJA</text>

<!-- Arrows left to center -->
<line x1="360" y1="117" x2="430" y2="200" stroke="#333" stroke-width="1.5"/>
<line x1="360" y1="187" x2="430" y2="220" stroke="#333" stroke-width="1.5"/>
<line x1="360" y1="257" x2="430" y2="250" stroke="#333" stroke-width="1.5"/>

<!-- Right capabilities -->
<rect x="840" y="90" width="270" height="55" rx="10" fill="#111" stroke="#e94560" stroke-width="1"/>
<text x="860" y="115" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Weather / GitHub / tmux</text>
<text x="860" y="132" fill="#555" font-family="system-ui" font-size="10">Skills del sistema</text>

<rect x="840" y="160" width="270" height="55" rx="10" fill="#111" stroke="#e94560" stroke-width="1"/>
<text x="860" y="185" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Imagen / Video / TTS</text>
<text x="860" y="202" fill="#555" font-family="system-ui" font-size="10">Skills de media</text>

<rect x="840" y="230" width="270" height="55" rx="10" fill="#111" stroke="#e94560" stroke-width="1"/>
<text x="860" y="255" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">MCP / Plugins / Custom</text>
<text x="860" y="272" fill="#555" font-family="system-ui" font-size="10">Extensiones avanzadas</text>

<!-- Arrows center to right -->
<line x1="770" y1="200" x2="840" y2="117" stroke="#333" stroke-width="1.5"/>
<line x1="770" y1="220" x2="840" y2="187" stroke="#333" stroke-width="1.5"/>
<line x1="770" y1="250" x2="840" y2="257" stroke="#333" stroke-width="1.5"/>

<!-- Bottom: install flow -->
<rect x="150" y="350" width="900" height="100" rx="14" fill="#111" stroke="#1a1a1a"/>
<text x="600" y="380" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="700">INSTALAR EN 1 COMANDO</text>

<rect x="180" y="395" width="250" height="40" rx="8" fill="#0d0d0d" stroke="#333"/>
<text x="305" y="420" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">clawhub install skill</text>

<text x="450" y="420" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="18" font-weight="700">--></text>

<rect x="480" y="395" width="250" height="40" rx="8" fill="#0d0d0d" stroke="#333"/>
<text x="605" y="420" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">clawhub update --all</text>

<text x="750" y="420" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="18" font-weight="700">--></text>

<rect x="780" y="395" width="250" height="40" rx="8" fill="#0d0d0d" stroke="#333"/>
<text x="905" y="420" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12">clawhub publish</text>

<!-- Title -->
<text x="600" y="520" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="700">OpenClaw Skills: Que Son y Como Instalarlas</text>
<text x="600" y="555" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
