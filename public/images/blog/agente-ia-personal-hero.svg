<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="50" y="50" width="1100" height="530" rx="24" fill="#111" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Robot icon -->
  <rect x="460" y="120" width="280" height="220" rx="40" fill="#1a1a1a" stroke="#e94560" stroke-width="2"/>
  <circle cx="540" cy="210" r="25" fill="#e94560" opacity="0.8"/>
  <circle cx="660" cy="210" r="25" fill="#e94560" opacity="0.8"/>
  <circle cx="540" cy="210" r="10" fill="#fff"/>
  <circle cx="660" cy="210" r="10" fill="#fff"/>
  <rect x="530" y="270" width="140" height="12" rx="6" fill="#333"/>
  <!-- Antenna -->
  <line x1="600" y1="120" x2="600" y2="80" stroke="#e94560" stroke-width="3"/>
  <circle cx="600" cy="72" r="10" fill="#e94560"/>
  <!-- Connection lines -->
  <line x1="300" y1="230" x2="460" y2="230" stroke="#e94560" stroke-width="1" stroke-dasharray="8 4" opacity="0.5"/>
  <line x1="740" y1="230" x2="900" y2="230" stroke="#e94560" stroke-width="1" stroke-dasharray="8 4" opacity="0.5"/>
  <!-- Left icons -->
  <rect x="200" y="180" width="80" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="240" y="230" text-anchor="middle" fill="#888" font-size="32">📧</text>
  <rect x="200" y="280" width="80" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="240" y="330" text-anchor="middle" fill="#888" font-size="32">💬</text>
  <!-- Right icons -->
  <rect x="920" y="180" width="80" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="960" y="230" text-anchor="middle" fill="#888" font-size="32">📅</text>
  <rect x="920" y="280" width="80" height="80" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="960" y="330" text-anchor="middle" fill="#888" font-size="32">🌐</text>
  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="36" font-weight="700">Agente IA Personal</text>
  <text x="600" y="480" text-anchor="middle" fill="#888" font-family="system-ui" font-size="18">Tu IA privada, conectada a todo, trabajando 24/7</text>
  <!-- TribuClaw branding -->
  <text x="600" y="540" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="16" font-weight="600">tribuclaw.com</text>
</svg>
