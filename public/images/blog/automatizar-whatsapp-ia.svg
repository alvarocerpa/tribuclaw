<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a0a"/>
  <text x="400" y="40" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="20" font-weight="bold">Automatizar WhatsApp con IA</text>
  <!-- Flow -->
  <rect x="50" y="100" width="160" height="70" rx="10" fill="none" stroke="#25D366" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" fill="#25D366" font-family="Arial,sans-serif" font-size="14">WhatsApp</text>
  <text x="130" y="150" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Mensaje entrante</text>
  <line x1="210" y1="135" x2="270" y2="135" stroke="#e94560" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="270" y="100" width="160" height="70" rx="10" fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="350" y="130" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="14">OpenClaw</text>
  <text x="350" y="150" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Gateway</text>
  <line x1="430" y1="135" x2="490" y2="135" stroke="#e94560" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="490" y="100" width="160" height="70" rx="10" fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="570" y="130" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="14">LLM</text>
  <text x="570" y="150" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Claude / GPT</text>
  <line x1="570" y1="170" x2="570" y2="220" stroke="#e94560" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="490" y="220" width="160" height="70" rx="10" fill="none" stroke="#25D366" stroke-width="2"/>
  <text x="570" y="250" text-anchor="middle" fill="#25D366" font-family="Arial,sans-serif" font-size="14">Respuesta</text>
  <text x="570" y="270" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Automatica</text>
  <!-- Use cases -->
  <text x="130" y="230" text-anchor="middle" fill="#666" font-family="Arial,sans-serif" font-size="12">Casos de uso:</text>
  <text x="130" y="255" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">• Atencion al cliente</text>
  <text x="130" y="275" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">• Recordatorios</text>
  <text x="130" y="295" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">• Resumir grupos</text>
  <text x="130" y="315" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="11">• Lead generation</text>
  <text x="400" y="370" text-anchor="middle" fill="#e94560" font-family="Arial,sans-serif" font-size="11">tribuclaw.com</text>
  <defs><marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/></marker></defs>
</svg>