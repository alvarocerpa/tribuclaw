<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Robot head -->
  <rect x="14" y="18" width="36" height="30" rx="6" fill="none" stroke="url(#agentGrad)" stroke-width="2.5" />

  <!-- Eyes -->
  <circle cx="24" cy="32" r="5" fill="#e94560" />
  <circle cx="40" cy="32" r="5" fill="#e94560" />

  <!-- Mouth/speaker -->
  <rect x="26" y="40" width="12" height="3" rx="1.5" fill="#e94560" opacity="0.8" />

  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#e94560" stroke-width="2" />
  <circle cx="32" cy="7" r="3" fill="#e94560" />

  <!-- Ears -->
  <rect x="8" y="28" width="4" height="10" rx="2" fill="none" stroke="#e94560" stroke-width="2" />
  <rect x="52" y="28" width="4" height="10" rx="2" fill="none" stroke="#e94560" stroke-width="2" />
</svg>
