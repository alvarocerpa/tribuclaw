<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />

  <!-- Grid pattern -->
  <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid1)" opacity="0.3" />

  <!-- Accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad1)" />

  <!-- Top right accent -->
  <path d="M 1200 0 L 1000 0 L 1200 200 Z" fill="#e94560" opacity="0.08" />

  <!-- Content area -->
  <g transform="translate(80, 160)">
    <!-- Agent robot icon -->
    <g transform="translate(30, 0)">
      <!-- Robot head -->
      <rect x="40" y="40" width="100" height="80" rx="12" fill="none" stroke="#e94560" stroke-width="3" />
      <circle cx="65" cy="75" r="12" fill="#e94560" opacity="0.9" filter="url(#glow1)" />
      <circle cx="115" cy="75" r="12" fill="#e94560" opacity="0.9" filter="url(#glow1)" />
      <rect x="70" y="95" width="40" height="6" rx="3" fill="#e94560" opacity="0.7" />

      <!-- Antenna -->
      <line x1="90" y1="40" x2="90" y2="20" stroke="#e94560" stroke-width="2" />
      <circle cx="90" cy="15" r="5" fill="#e94560" filter="url(#glow1)" />

      <!-- Memory icon (brain) connected to robot -->
      <g transform="translate(20, 140)">
        <ellipse cx="50" cy="35" rx="40" ry="30" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6" />
        <path d="M 20 35 Q 35 15 50 35 Q 65 55 80 35" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5" />
        <path d="M 25 40 Q 40 25 50 40 Q 60 55 75 40" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.4" />
        <!-- Connection line -->
        <line x1="50" y1="-60" x2="50" y2="-20" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,2" />
        <circle cx="50" cy="-20" r="3" fill="#e94560" />
      </g>

      <!-- Data particles -->
      <circle cx="150" cy="50" r="2" fill="#e94560" opacity="0.4" />
      <circle cx="160" cy="70" r="1.5" fill="#e94560" opacity="0.3" />
      <circle cx="155" cy="100" r="2.5" fill="#e94560" opacity="0.5" />
    </g>

    <!-- Title -->
    <text x="280" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e0e0e0" font-weight="700">Agente IA con</text>
    <text x="280" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="38" fill="#e94560" font-weight="700">Sistema de Memoria</text>

    <!-- Subtitle -->
    <text x="280" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#888">
      La clave para agentes que recuerdan y aprenden
    </text>

    <!-- Category tag -->
    <rect x="280" y="165" width="140" height="30" rx="4" fill="#e94560" opacity="0.2" />
    <text x="350" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">AGENTES IA</text>

    <!-- Highlight bullets -->
    <g transform="translate(280, 220)">
      <circle cx="0" cy="0" r="3" fill="#e94560" />
      <text x="15" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Memoria a largo plazo</text>

      <circle cx="0" cy="25" r="3" fill="#e94560" />
      <text x="15" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Aprendizaje continuo</text>

      <circle cx="0" cy="50" r="3" fill="#e94560" />
      <text x="15" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Contexto persistente</text>
    </g>
  </g>

  <!-- Bottom decoration -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a1a1a" stroke-width="1" />
  <rect x="0" y="620" width="1200" height="10" fill="#0a0a0a" />
  <circle cx="1150" cy="580" r="4" fill="#e94560" opacity="0.6" />
  <circle cx="1165" cy="580" r="3" fill="#e94560" opacity="0.4" />
  <circle cx="1178" cy="580" r="2" fill="#e94560" opacity="0.3" />
</svg>
