<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
<rect width="800" height="380" rx="12" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Headers -->
<rect x="270" y="20" width="250" height="35" rx="6" fill="#e94560" opacity="0.2"/>
<text x="395" y="43" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">Tu Agente IA</text>
<rect x="540" y="20" width="230" height="35" rx="6" fill="#333" opacity="0.5"/>
<text x="655" y="43" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13" font-weight="700">ChatGPT</text>

<!-- Rows -->
<text x="140" y="90" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Memoria</text>
<text x="395" y="90" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12">Permanente ✓</text>
<text x="655" y="90" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12">Se reinicia ✗</text>
<line x1="50" y1="105" x2="750" y2="105" stroke="#1a1a1a" stroke-width="1"/>

<text x="140" y="135" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Conexiones</text>
<text x="395" y="135" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12">WhatsApp, email... ✓</text>
<text x="655" y="135" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12">Solo chat web ✗</text>
<line x1="50" y1="150" x2="750" y2="150" stroke="#1a1a1a" stroke-width="1"/>

<text x="140" y="180" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Autonomia</text>
<text x="395" y="180" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12">Actua solo 24/7 ✓</text>
<text x="655" y="180" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12">Espera preguntas ✗</text>
<line x1="50" y1="195" x2="750" y2="195" stroke="#1a1a1a" stroke-width="1"/>

<text x="140" y="225" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Privacidad</text>
<text x="395" y="225" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12">Tu servidor ✓</text>
<text x="655" y="225" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12">Servidores OpenAI ✗</text>
<line x1="50" y1="240" x2="750" y2="240" stroke="#1a1a1a" stroke-width="1"/>

<text x="140" y="270" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Personalidad</text>
<text x="395" y="270" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12">Personalizada ✓</text>
<text x="655" y="270" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12">Generica ✗</text>
<line x1="50" y1="285" x2="750" y2="285" stroke="#1a1a1a" stroke-width="1"/>

<text x="140" y="315" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Proactividad</text>
<text x="395" y="315" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12">Te avisa de cosas ✓</text>
<text x="655" y="315" text-anchor="middle" fill="#666" font-family="system-ui" font-size="12">No hace nada solo ✗</text>

<!-- Bottom verdict -->
<rect x="250" y="340" width="300" height="28" rx="6" fill="#e94560" opacity="0.15"/>
<text x="400" y="359" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12" font-weight="700">Herramienta vs. miembro de tu equipo</text>
</svg>
