<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3" />

  <!-- Accent left bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accentGrad)" />

  <!-- Top right accent -->
  <path d="M 1200 0 L 1000 0 L 1200 200 Z" fill="#e94560" opacity="0.08" />

  <!-- Content area -->
  <g transform="translate(80, 140)">
    <!-- Globe + Spanish flag illustration -->
    <g transform="translate(20, 10)">
      <!-- Globe -->
      <circle cx="80" cy="80" r="70" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6" />
      <ellipse cx="80" cy="80" rx="70" ry="25" fill="none" stroke="#e94560" stroke-width="1" opacity="0.3" />
      <ellipse cx="80" cy="80" rx="25" ry="70" fill="none" stroke="#e94560" stroke-width="1" opacity="0.3" />
      <line x1="10" y1="80" x2="150" y2="80" stroke="#e94560" stroke-width="1" opacity="0.3" />
      <line x1="80" y1="10" x2="80" y2="150" stroke="#e94560" stroke-width="1" opacity="0.3" />

      <!-- Spotlight on Spanish-speaking regions -->
      <path d="M 55 50 Q 65 45 80 55 Q 95 65 90 80 Q 85 90 75 85 Q 60 80 55 70 Z" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="1.5" filter="url(#glow)" />

      <!-- Speech bubbles (Spanish content) -->
      <g transform="translate(150, 10)">
        <rect x="0" y="0" width="60" height="28" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5" />
        <text x="30" y="19" font-family="system-ui, sans-serif" font-size="11" fill="#e94560" text-anchor="middle" font-weight="600">ES</text>
        <polygon points="10,28 20,28 5,38" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5" />
      </g>

      <g transform="translate(160, 50)">
        <rect x="0" y="0" width="50" height="24" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1.5" opacity="0.7" />
        <text x="25" y="17" font-family="system-ui, sans-serif" font-size="10" fill="#e94560" text-anchor="middle" opacity="0.7">Agentes</text>
      </g>

      <!-- "Void" indicator - empty space -->
      <g transform="translate(155, 110)">
        <rect x="0" y="0" width="70" height="50" rx="6" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6,4" />
        <text x="35" y="22" font-family="system-ui, sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle">?</text>
        <text x="35" y="40" font-family="system-ui, sans-serif" font-size="9" fill="#333" text-anchor="middle">VACIO</text>
      </g>

      <!-- Connection lines -->
      <line x1="150" y1="80" x2="155" y2="25" stroke="#e94560" stroke-width="1" opacity="0.4" />
      <line x1="150" y1="80" x2="165" y2="62" stroke="#e94560" stroke-width="1" opacity="0.3" />
    </g>

    <!-- Title -->
    <text x="300" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#e0e0e0" font-weight="700">Agentes IA</text>
    <text x="300" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#e94560" font-weight="700">en espanol</text>

    <!-- Subtitle -->
    <text x="300" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#888">
      La oportunidad que nadie ve en el mercado hispanohablante
    </text>

    <!-- Category tag -->
    <rect x="300" y="155" width="140" height="30" rx="4" fill="#e94560" opacity="0.2" />
    <text x="370" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e94560" text-anchor="middle" font-weight="600">MERCADO IA</text>

    <!-- Highlight bullets -->
    <g transform="translate(300, 210)">
      <circle cx="0" cy="0" r="3" fill="#e94560" />
      <text x="15" y="4" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Mercado hispano sin competencia</text>

      <circle cx="0" cy="25" r="3" fill="#e94560" />
      <text x="15" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Contenido real, no traducciones</text>

      <circle cx="0" cy="50" r="3" fill="#e94560" />
      <text x="15" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">TribuClaw lidera el espacio</text>
    </g>
  </g>

  <!-- Bottom decoration -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a1a1a" stroke-width="1" />
  <rect x="0" y="620" width="1200" height="10" fill="#0a0a0a" />
  <circle cx="1150" cy="580" r="4" fill="#e94560" opacity="0.6" />
  <circle cx="1165" cy="580" r="3" fill="#e94560" opacity="0.4" />
  <circle cx="1178" cy="580" r="2" fill="#e94560" opacity="0.3" />
</svg>