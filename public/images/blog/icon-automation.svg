<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="autoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Large gear -->
  <g transform="translate(32, 32)">
    <!-- Gear body -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#autoGrad)" stroke-width="3" />
    <circle cx="0" cy="0" r="5" fill="none" stroke="url(#autoGrad)" stroke-width="2" />

    <!-- Gear teeth -->
    <g stroke="url(#autoGrad)" stroke-width="2.5">
      <rect x="-3" y="-22" width="6" height="6" rx="1" />
      <rect x="-3" y="16" width="6" height="6" rx="1" />
      <rect x="-22" y="-3" width="6" height="6" rx="1" />
      <rect x="16" y="-3" width="6" height="6" rx="1" />

      <!-- Diagonal teeth -->
      <rect x="9" y="-15" width="6" height="6" rx="1" transform="rotate(45 12 -12)" />
      <rect x="-15" y="-15" width="6" height="6" rx="1" transform="rotate(-45 -12 -12)" />
      <rect x="9" y="9" width="6" height="6" rx="1" transform="rotate(45 12 12)" />
      <rect x="-15" y="9" width="6" height="6" rx="1" transform="rotate(-45 -12 12)" />
    </g>
  </g>

  <!-- Small gear -->
  <g transform="translate(52, 16)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6" />
    <circle cx="0" cy="0" r="3" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.6" />
    <!-- Teeth -->
    <g stroke="#e94560" stroke-width="2" opacity="0.6">
      <rect x="-2" y="-12" width="4" height="4" rx="1" />
      <rect x="-2" y="8" width="4" height="4" rx="1" />
      <rect x="-12" y="-2" width="4" height="4" rx="1" />
      <rect x="8" y="-2" width="4" height="4" rx="1" />
    </g>
  </g>

  <!-- Connection line -->
  <line x1="42" y1="28" x2="48" y2="22" stroke="#e94560" stroke-width="1.5" opacity="0.4" />
</svg>
