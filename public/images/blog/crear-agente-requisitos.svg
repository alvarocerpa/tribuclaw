<text x="655" y="315" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="800">3</text>

<!-- Title -->
<text x="400" y="30" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Lo que necesitas para crear tu agente IA</text>
