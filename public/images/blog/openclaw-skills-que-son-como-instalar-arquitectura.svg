<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
<rect width="800" height="400" fill="#080808"/>
<rect x="20" y="20" width="760" height="360" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<text x="400" y="55" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="15" font-weight="700">ARQUITECTURA DE SKILLS EN OPENCLAW</text>

<!-- SKILL.md file -->
<rect x="50" y="80" width="220" height="180" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="160" y="110" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">SKILL.md</text>
<rect x="70" y="125" width="180" height="22" rx="4" fill="#0d0d0d"/>
<text x="80" y="141" fill="#888" font-family="monospace" font-size="10">name: mi-skill</text>
<rect x="70" y="153" width="180" height="22" rx="4" fill="#0d0d0d"/>
<text x="80" y="169" fill="#888" font-family="monospace" font-size="10">description: Hace X</text>
<rect x="70" y="181" width="180" height="22" rx="4" fill="#0d0d0d"/>
<text x="80" y="197" fill="#888" font-family="monospace" font-size="10">requires: bins, env</text>
<rect x="70" y="209" width="180" height="35" rx="4" fill="#0d0d0d"/>
<text x="80" y="225" fill="#fff" font-family="monospace" font-size="10"># Instrucciones</text>
<text x="80" y="238" fill="#555" font-family="monospace" font-size="9">1. Haz esto  2. Luego esto</text>

<!-- Arrow -->
<text x="310" y="175" fill="#e94560" font-family="system-ui" font-size="22" font-weight="700">--></text>

<!-- Gating filter -->
<rect x="350" y="100" width="160" height="140" rx="12" fill="#111" stroke="#333"/>
<text x="430" y="130" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12" font-weight="700">GATING</text>
<text x="430" y="155" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">bins en PATH?</text>
<text x="430" y="175" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">env vars?</text>
<text x="430" y="195" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">config truthy?</text>
<text x="430" y="220" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Filtra automatico</text>

<!-- Arrow -->
<text x="545" y="175" fill="#e94560" font-family="system-ui" font-size="22" font-weight="700">--></text>

<!-- Agent prompt -->
<rect x="580" y="100" width="180" height="140" rx="12" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="670" y="130" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="12" font-weight="700">PROMPT DEL AGENTE</text>
<text x="670" y="155" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">Skills cargadas:</text>
<text x="670" y="175" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">- weather</text>
<text x="670" y="190" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">- github</text>
<text x="670" y="205" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">- mi-skill-custom</text>
<text x="670" y="220" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">- ...</text>

<!-- Bottom note -->
<rect x="100" y="300" width="600" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="400" y="325" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Texto plano. Sin codigo ejecutable. Legible y modificable por humanos.</text>
<text x="400" y="343" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">Las skills son instrucciones Markdown, no binarios ni scripts</text>
</svg>
