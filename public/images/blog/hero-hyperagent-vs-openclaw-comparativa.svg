<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#1a1a1a" rx="12"/>

  <!-- Titulo -->
  <text x="600" y="70" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="32" font-weight="700">HYPERAGENT vs OPENCLAW</text>
  <text x="600" y="100" text-anchor="middle" fill="#888" font-family="system-ui" font-size="16">La comparativa honesta que nadie hace</text>

  <!-- VS divider -->
  <line x1="600" y1="130" x2="600" y2="520" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="570" y="285" width="60" height="40" fill="#e94560" rx="6"/>
  <text x="600" y="311" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="18" font-weight="900">VS</text>

  <!-- HYPERAGENT lado izquierdo -->
  <text x="300" y="155" text-anchor="middle" fill="#4a9eff" font-family="system-ui" font-size="22" font-weight="700">HYPERAGENT</text>
  <text x="300" y="178" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">by Airtable</text>

  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="460" height="46" fill="#0d1520" stroke="#1a2a3a" rx="6"/>
    <text x="16" y="22" fill="#888" font-family="system-ui" font-size="13">Hosting</text>
    <text x="16" y="38" fill="#4a9eff" font-family="system-ui" font-size="13" font-weight="600">Cloud de Airtable</text>

    <rect x="0" y="54" width="460" height="46" fill="#0d0d0d" stroke="#1a1a1a" rx="6"/>
    <text x="16" y="76" fill="#888" font-family="system-ui" font-size="13">Precio</text>
    <text x="16" y="92" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">Enterprise (por confirmar)</text>

    <rect x="0" y="108" width="460" height="46" fill="#0d1520" stroke="#1a2a3a" rx="6"/>
    <text x="16" y="130" fill="#888" font-family="system-ui" font-size="13">Privacidad</text>
    <text x="16" y="146" fill="#f59e0b" font-family="system-ui" font-size="13" font-weight="600">Datos en servidores de Airtable</text>

    <rect x="0" y="162" width="460" height="46" fill="#0d0d0d" stroke="#1a1a1a" rx="6"/>
    <text x="16" y="184" fill="#888" font-family="system-ui" font-size="13">Setup</text>
    <text x="16" y="200" fill="#22c55e" font-family="system-ui" font-size="13" font-weight="600">Muy facil, listo al momento</text>

    <rect x="0" y="216" width="460" height="46" fill="#0d1520" stroke="#1a2a3a" rx="6"/>
    <text x="16" y="238" fill="#888" font-family="system-ui" font-size="13">Mejor para</text>
    <text x="16" y="254" fill="#4a9eff" font-family="system-ui" font-size="13" font-weight="600">Empresas medianas y grandes</text>
  </g>

  <!-- OPENCLAW lado derecho -->
  <text x="900" y="155" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="22" font-weight="700">OPENCLAW</text>
  <text x="900" y="178" text-anchor="middle" fill="#555" font-family="system-ui" font-size="13">Open Source</text>

  <g transform="translate(660, 200)">
    <rect x="0" y="0" width="460" height="46" fill="#1a0d0d" stroke="#2a1a1a" rx="6"/>
    <text x="16" y="22" fill="#888" font-family="system-ui" font-size="13">Hosting</text>
    <text x="16" y="38" fill="#e94560" font-family="system-ui" font-size="13" font-weight="600">Tu propio servidor</text>

    <rect x="0" y="54" width="460" height="46" fill="#0d0d0d" stroke="#1a1a1a" rx="6"/>
    <text x="16" y="76" fill="#888" font-family="system-ui" font-size="13">Precio</text>
    <text x="16" y="92" fill="#22c55e" font-family="system-ui" font-size="13" font-weight="600">Gratis + servidor desde 4 EUR/mes</text>

    <rect x="0" y="108" width="460" height="46" fill="#1a0d0d" stroke="#2a1a1a" rx="6"/>
    <text x="16" y="130" fill="#888" font-family="system-ui" font-size="13">Privacidad</text>
    <text x="16" y="146" fill="#22c55e" font-family="system-ui" font-size="13" font-weight="600">Datos 100% en tu maquina</text>

    <rect x="0" y="162" width="460" height="46" fill="#0d0d0d" stroke="#1a1a1a" rx="6"/>
    <text x="16" y="184" fill="#888" font-family="system-ui" font-size="13">Setup</text>
    <text x="16" y="200" fill="#f59e0b" font-family="system-ui" font-size="13" font-weight="600">Configuracion inicial necesaria</text>

    <rect x="0" y="216" width="460" height="46" fill="#1a0d0d" stroke="#2a1a1a" rx="6"/>
    <text x="16" y="238" fill="#888" font-family="system-ui" font-size="13">Mejor para</text>
    <text x="16" y="254" fill="#e94560" font-family="system-ui" font-size="13" font-weight="600">Emprendedores y equipos pequenos</text>
  </g>

  <!-- Bottom bar -->
  <rect x="80" y="490" width="1040" height="50" fill="#e94560" rx="6"/>
  <text x="600" y="522" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="17" font-weight="700">TRIBUCLAW.COM - APRENDE OPENCLAW EN ESPANOL</text>

  <text x="600" y="580" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
