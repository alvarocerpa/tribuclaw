<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#1a1a1a" rx="12"/>

  <text x="600" y="65" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="30" font-weight="700">AUTOMATIZAR CLIPS VIRALES CON OPENCLAW</text>
  <text x="600" y="93" text-anchor="middle" fill="#888" font-family="system-ui" font-size="15">Sistema de 3 agentes: de 45 minutos a 5 minutos por clip</text>

  <!-- Stat central grande -->
  <rect x="490" y="108" width="220" height="90" fill="#1a0808" stroke="#e94560" stroke-width="2" rx="10"/>
  <text x="600" y="148" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="36" font-weight="900">45 min</text>
  <text x="600" y="172" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">antes por clip</text>

  <text x="600" y="222" text-anchor="middle" fill="#555" font-family="system-ui" font-size="28" font-weight="900">↓</text>

  <rect x="490" y="230" width="220" height="90" fill="#0a1a0a" stroke="#22c55e" stroke-width="2" rx="10"/>
  <text x="600" y="270" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="36" font-weight="900">5 min</text>
  <text x="600" y="294" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">ahora por clip</text>

  <!-- Los 3 agentes -->
  <!-- X Clippy -->
  <rect x="60" y="120" width="380" height="210" fill="#0d0d0d" stroke="#4a9eff" stroke-width="1.5" rx="10"/>
  <text x="250" y="148" text-anchor="middle" fill="#4a9eff" font-family="system-ui" font-size="16" font-weight="700">X CLIPPY</text>
  <text x="250" y="170" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">Monitoriza cuentas de X</text>
  <text x="130" y="200" fill="#555" font-family="system-ui" font-size="12">+ Puntua viralidad</text>
  <text x="130" y="220" fill="#555" font-family="system-ui" font-size="12">+ Filtra talking-heads</text>
  <text x="130" y="240" fill="#555" font-family="system-ui" font-size="12">+ Ultimas 48 horas</text>
  <text x="130" y="260" fill="#4a9eff" font-family="system-ui" font-size="13" font-weight="600">+ Score de viralidad automatico</text>
  <text x="130" y="300" fill="#888" font-family="system-ui" font-size="11">Resultado: los mejores momentos de X</text>

  <!-- YT Clippy -->
  <rect x="760" y="120" width="380" height="210" fill="#0d0d0d" stroke="#a855f7" stroke-width="1.5" rx="10"/>
  <text x="950" y="148" text-anchor="middle" fill="#a855f7" font-family="system-ui" font-size="16" font-weight="700">YT CLIPPY</text>
  <text x="950" y="170" text-anchor="middle" fill="#888" font-family="system-ui" font-size="12">Busca en YouTube</text>
  <text x="820" y="200" fill="#555" font-family="system-ui" font-size="12">+ Pipeline audio-first</text>
  <text x="820" y="220" fill="#555" font-family="system-ui" font-size="12">+ Proxies residenciales</text>
  <text x="820" y="240" fill="#555" font-family="system-ui" font-size="12">+ Transcripcion Whisper</text>
  <text x="820" y="260" fill="#a855f7" font-family="system-ui" font-size="13" font-weight="600">+ Solo descarga el fragmento</text>
  <text x="820" y="300" fill="#888" font-family="system-ui" font-size="11">Resultado: clips de entrevistas largas</text>

  <!-- Pipeline 6 pasos -->
  <text x="600" y="365" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="15" font-weight="600">EL PIPELINE AUTOMATICO</text>

  <g transform="translate(60, 380)">
    <!-- Paso 1 -->
    <rect x="0" y="0" width="145" height="70" fill="#0a0d1a" stroke="#4a9eff" rx="6"/>
    <text x="72" y="22" text-anchor="middle" fill="#4a9eff" font-family="system-ui" font-size="11" font-weight="700">1. DETECTAR</text>
    <text x="72" y="42" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Momento candidato</text>
    <text x="72" y="57" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">segun criterios</text>

    <text x="157" y="40" fill="#e94560" font-family="system-ui" font-size="18" font-weight="900">→</text>

    <!-- Paso 2 -->
    <rect x="170" y="0" width="145" height="70" fill="#0a1a0a" stroke="#22c55e" rx="6"/>
    <text x="242" y="22" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="700">2. DESCARGAR</text>
    <text x="242" y="42" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Solo el fragmento</text>
    <text x="242" y="57" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">yt-dlp</text>

    <text x="327" y="40" fill="#e94560" font-family="system-ui" font-size="18" font-weight="900">→</text>

    <!-- Paso 3 -->
    <rect x="340" y="0" width="145" height="70" fill="#1a0a1a" stroke="#a855f7" rx="6"/>
    <text x="412" y="22" text-anchor="middle" fill="#a855f7" font-family="system-ui" font-size="11" font-weight="700">3. TRANSCRIBIR</text>
    <text x="412" y="42" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Groq Whisper API</text>
    <text x="412" y="57" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">en segundos</text>

    <text x="497" y="40" fill="#e94560" font-family="system-ui" font-size="18" font-weight="900">→</text>

    <!-- Paso 4 -->
    <rect x="510" y="0" width="145" height="70" fill="#0a0d1a" stroke="#f59e0b" rx="6"/>
    <text x="582" y="22" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="11" font-weight="700">4. RECORTAR</text>
    <text x="582" y="42" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Corte limpio</text>
    <text x="582" y="57" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">ffmpeg</text>

    <text x="667" y="40" fill="#e94560" font-family="system-ui" font-size="18" font-weight="900">→</text>

    <!-- Paso 5 -->
    <rect x="680" y="0" width="145" height="70" fill="#1a0808" stroke="#e94560" rx="6"/>
    <text x="752" y="22" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11" font-weight="700">5. SUBTITULOS</text>
    <text x="752" y="42" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Quemados en video</text>
    <text x="752" y="57" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">automatico</text>

    <text x="837" y="40" fill="#e94560" font-family="system-ui" font-size="18" font-weight="900">→</text>

    <!-- Paso 6 -->
    <rect x="850" y="0" width="145" height="70" fill="#0a1a0a" stroke="#22c55e" rx="6"/>
    <text x="922" y="22" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="11" font-weight="700">6. ENTREGAR</text>
    <text x="922" y="42" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Clip listo en Slack</text>
    <text x="922" y="57" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="10">60K+ vistas</text>
  </g>

  <rect x="80" y="490" width="1040" height="50" fill="#e94560" rx="6"/>
  <text x="600" y="522" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="17" font-weight="700">AUTOMATIZA TU CONTENIDO - TRIBUCLAW.COM</text>

  <text x="600" y="580" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
