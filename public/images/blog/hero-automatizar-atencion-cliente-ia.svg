<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo negro -->
  <rect width="1200" height="630" fill="#050505"/>

  <!-- Círculo decorativo rosa -->
  <circle cx="100" cy="500" r="250" fill="#e94560" opacity="0.1"/>

  <!-- Burbujas de chat/mensajes -->
  <g transform="translate(850, 100)">
    <!-- Chat bubble 1 -->
    <rect x="0" y="0" width="200" height="60" rx="30" fill="#e94560" opacity="0.8"/>
    <text x="100" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">¿Cómo funciona?</text>

    <!-- Chat bubble 2 -->
    <rect x="40" y="80" width="200" height="60" rx="30" fill="#333" stroke="#e0e0e0" stroke-width="2"/>
    <text x="140" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Respuesta automática</text>

    <!-- Chat bubble 3 -->
    <rect x="0" y="160" width="200" height="60" rx="30" fill="#e94560" opacity="0.8"/>
    <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">¡Genial! 🎉</text>
  </g>

  <!-- Check de respuestas automáticas -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="300" height="180" rx="10" fill="#111" stroke="#e94560" stroke-width="2"/>
    <text x="150" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#e0e0e0">Respuestas IA</text>

    <!-- Check items -->
    <g transform="translate(30, 60)">
      <circle cx="15" cy="15" r="12" fill="#e94560"/>
      <path d="M9 15 L13 19 L21 11" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="20" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Preguntas frecuentes</text>

      <circle cx="15" cy="55" r="12" fill="#e94560"/>
      <path d="M9 55 L13 59 L21 51" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="60" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Horarios y precios</text>

      <circle cx="15" cy="95" r="12" fill="#e94560"/>
      <path d="M9 95 L13 99 L21 91" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
      <text x="40" y="100" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Procesos básicos</text>
    </g>
  </g>

  <!-- Usuario satisfecho -->
  <g transform="translate(500, 380)">
    <circle cx="100" cy="100" r="90" fill="#e94560" opacity="0.15"/>
    <circle cx="100" cy="100" r="70" fill="#e94560" opacity="0.1"/>

    <!-- Avatar usuario -->
    <circle cx="100" cy="100" r="50" fill="#333" stroke="#e94560" stroke-width="3"/>
    <circle cx="100" cy="80" r="20" fill="#e0e0e0"/>
    <path d="M70 120 Q100 160 130 120" stroke="#e0e0e0" stroke-width="3" fill="none"/>

    <!-- Sonrisa -->
    <path d="M85 90 Q100 105 115 90" stroke="#050505" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Estrellas de satisfacción -->
    <polygon points="50,40 53,52 65,52 55,60 59,72 50,64 41,72 45,60 35,52 47,52" fill="#ffc400"/>
    <polygon points="140,60 143,72 155,72 145,80 149,92 140,84 131,92 135,80 125,72 137,72" fill="#ffc400"/>
  </g>

  <!-- Título principal -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#e0e0e0">Atención al Cliente con IA</text>

  <!-- Subtítulo rosa -->
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="24" fill="#e94560">80% Automático, 100% Humano</text>

  <!-- Iconos decorativos de mensajes -->
  <g transform="translate(850, 380)">
    <circle cx="0" cy="0" r="20" fill="#e94560" opacity="0.2"/>
    <circle cx="40" cy="30" r="15" fill="#e94560" opacity="0.3"/>
    <circle cx="80" cy="50" r="25" fill="#e94560" opacity="0.15"/>
    <circle cx="120" cy="20" r="18" fill="#e94560" opacity="0.25"/>
  </g>
</svg>