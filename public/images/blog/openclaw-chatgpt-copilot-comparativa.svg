  <text x="685" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Permanente</text>
  
  <rect x="600" y="230" width="170" height="40" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1"/>
  <text x="685" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Todo</text>
  
  <rect x="600" y="280" width="170" height="40" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1"/>
  <text x="685" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Total</text>
  
  <rect x="600" y="330" width="170" height="40" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1"/>
  <text x="685" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Tu servidor</text>
