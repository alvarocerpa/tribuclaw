  <text x="490" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">GitHub Copilot</text>
  
  <rect x="390" y="130" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="490" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Asistente de codigo</text>
  
  <rect x="390" y="180" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="490" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888" text-anchor="middle">Solo en el IDE</text>
  
  <rect x="390" y="230" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="490" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888" text-anchor="middle">Solo editor</text>
  
  <rect x="390" y="280" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="490" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e94560" text-anchor="middle">Cero</text>
  
  <rect x="390" y="330" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="490" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888" text-anchor="middle">Datos en Microsoft</text>
  
  <!-- OpenClaw Column -->
  <rect x="600" y="80" width="170" height="40" rx="6" fill="#e94560"/>
  <text x="685" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">OpenClaw</text>
  
  <rect x="600" y="130" width="170" height="40" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1"/>
  <text x="685" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e94560" font-weight="600" text-anchor="middle">Agente autonomo</text>
  
