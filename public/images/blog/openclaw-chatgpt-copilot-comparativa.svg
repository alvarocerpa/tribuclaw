<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#080808"/>
  
  <!-- Container -->
  <rect x="20" y="20" width="760" height="360" rx="12" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Title -->
  <text x="400" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">Tres herramientas. Tres propositos. Tres niveles de autonomia.</text>
  
  <!-- Row Headers -->
  <rect x="30" y="80" width="140" height="40" rx="6" fill="#1a1a1a"/>
  <text x="100" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Herramienta</text>
  
  <rect x="30" y="130" width="140" height="40" rx="6" fill="#1a1a1a"/>
  <text x="100" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Tipo</text>
  
  <rect x="30" y="180" width="140" height="40" rx="6" fill="#1a1a1a"/>
  <text x="100" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Memoria</text>
  
  <rect x="30" y="230" width="140" height="40" rx="6" fill="#1a1a1a"/>
  <text x="100" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Conexiones</text>
  
  <rect x="30" y="280" width="140" height="40" rx="6" fill="#1a1a1a"/>
  <text x="100" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Autonomia</text>
  
  <rect x="30" y="330" width="140" height="40" rx="6" fill="#1a1a1a"/>
  <text x="100" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Privacidad</text>
  
  <!-- ChatGPT Column -->
  <rect x="180" y="80" width="200" height="40" rx="6" fill="#10a37f"/>
  <text x="280" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">ChatGPT</text>
  
  <rect x="180" y="130" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="280" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fff" text-anchor="middle">Chat conversacional</text>
  
  <rect x="180" y="180" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="280" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e94560" text-anchor="middle">Limitada</text>
  
  <rect x="180" y="230" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="280" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e94560" text-anchor="middle">Ninguna</text>
  
  <rect x="180" y="280" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="280" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#e94560" text-anchor="middle">Cero</text>
  
  <rect x="180" y="330" width="200" height="40" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="280" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888" text-anchor="middle">Datos en OpenAI</text>
  
  <!-- Copilot Column -->
