<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
<rect width="1200" height="630" fill="#080808"/>
<rect x="40" y="40" width="1120" height="550" rx="20" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- Central hub -->
<rect x="430" y="120" width="340" height="100" rx="16" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="600" y="160" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="700">COMUNIDAD DE PAGO</text>
<text x="600" y="185" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Ingresos recurrentes con IA</text>

<!-- Left column: Contenido -->
<rect x="80" y="270" width="220" height="80" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="190" y="305" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="600">Tutoriales semanales</text>
<text x="190" y="325" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Guias practicas de IA</text>

<rect x="80" y="370" width="220" height="80" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="190" y="405" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="14" font-weight="600">Directos mensuales</text>
<text x="190" y="425" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">Q&A + talleres en vivo</text>

<!-- Center column: Modelo -->
<rect x="370" y="270" width="260" height="80" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="500" y="300" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="700">100 miembros x 29EUR</text>
<text x="500" y="325" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="800">= 2.900 EUR/mes</text>

<rect x="370" y="370" width="260" height="80" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="500" y="400" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="700">300 miembros x 29EUR</text>
<text x="500" y="425" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="20" font-weight="800">= 8.700 EUR/mes</text>

<!-- Right column: Plataformas -->
<rect x="700" y="270" width="220" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="810" y="303" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">Whop</text>
<text x="920" y="303" text-anchor="end" fill="#888" font-family="system-ui" font-size="11">Marketplace + ventas</text>

<rect x="700" y="340" width="220" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="810" y="373" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">Skool</text>
<text x="920" y="373" text-anchor="end" fill="#888" font-family="system-ui" font-size="11">Gamificacion</text>

<rect x="700" y="410" width="220" height="55" rx="10" fill="#111" stroke="#1a1a1a"/>
<text x="810" y="443" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="600">Circle</text>
<text x="920" y="443" text-anchor="end" fill="#888" font-family="system-ui" font-size="11">Personalizacion</text>

<!-- Connection lines -->
<line x1="300" y1="310" x2="370" y2="310" stroke="#333" stroke-width="1"/>
<line x1="300" y1="410" x2="370" y2="410" stroke="#333" stroke-width="1"/>
<line x1="630" y1="310" x2="700" y2="310" stroke="#333" stroke-width="1"/>
<line x1="630" y1="410" x2="700" y2="410" stroke="#333" stroke-width="1"/>
<line x1="600" y1="220" x2="600" y2="270" stroke="#e94560" stroke-width="1.5"/>

<!-- Title -->
<text x="600" y="525" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="22" font-weight="700">Como crear una comunidad de pago sobre IA</text>
<text x="600" y="555" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12">tribuclaw.com</text>
</svg>
