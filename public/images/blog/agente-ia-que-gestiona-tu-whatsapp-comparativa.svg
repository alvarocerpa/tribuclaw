<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="380" fill="url(#bg3)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Comparativa: Agente IA vs Atencion Manual</text>
  
  <!-- Table header -->
  <rect x="40" y="60" width="720" height="40" rx="4" fill="#1a1a1a"/>
  <text x="200" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="700">METRICA</text>
  <text x="480" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="700">SIN AGENTE</text>
  <text x="680" y="85" text-anchor="middle" fill="#e94560" font-size="14" font-weight="700">CON AGENTE</text>
  
  <!-- Row 1: Response time -->
  <rect x="40" y="105" width="720" height="45" fill="#0d0d0d"/>
  <text x="200" y="135" text-anchor="middle" fill="#fff" font-size="13">Tiempo de respuesta</text>
  <text x="480" y="135" text-anchor="middle" fill="#e94560" font-size="13">~4-8 horas</text>
  <text x="680" y="135" text-anchor="middle" fill="#25D366" font-size="13">&lt; 30 segundos</text>
  
  <!-- Row 2: Hours per day -->
  <rect x="40" y="155" width="720" height="45" fill="#0d0d0d"/>
  <text x="200" y="185" text-anchor="middle" fill="#fff" font-size="13">Horas/dia en WhatsApp</text>
  <text x="480" y="185" text-anchor="middle" fill="#e94560" font-size="13">4-6 horas</text>
  <text x="680" y="185" text-anchor="middle" fill="#25D366" font-size="13">30 minutos</text>
  
  <!-- Row 3: Leads handled -->
  <rect x="40" y="205" width="720" height="45" fill="#0d0d0d"/>
  <text x="200" y="235" text-anchor="middle" fill="#fff" font-size="13">Leads/dia que puedo atender</text>
  <text x="480" y="235" text-anchor="middle" fill="#e94560" font-size="13">15-20</text>
  <text x="680" y="235" text-anchor="middle" fill="#25D366" font-size="13">80-100</text>
  
  <!-- Row 4: Qualification rate -->
  <rect x="40" y="255" width="720" height="45" fill="#0d0d0d"/>
  <text x="200" y="285" text-anchor="middle" fill="#fff" font-size="13">Leads qualificados</text>
  <text x="480" y="285" text-anchor="middle" fill="#e94560" font-size="13">25%</text>
  <text x="680" y="285" text-anchor="middle" fill="#25D366" font-size="13">67%</text>
  
  <!-- Row 5: Cost comparison -->
  <rect x="40" y="305" width="720" height="55" rx="4" fill="#0d0d0d" stroke="#1a1a1a"/>
  <text x="200" y="335" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Coste mensual</text>
  <text x="480" y="335" text-anchor="middle" fill="#e94560" font-size="13">0 eur (tu tiempo)</text>
  <text x="680" y="335" text-anchor="middle" fill="#25D366" font-size="13">49-100 eur/mes</text>
  <text x="480" y="352" text-anchor="middle" fill="#888" font-size="10">(valor: 800-1500 eur)</text>
  <text x="680" y="352" text-anchor="middle" fill="#25D366" font-size="10">(inversion recuperada en 1 dia)</text>
  
  <!-- ROI highlight -->
  <rect x="40" y="100" width="180" height="200" rx="8" fill="#0d0d0d" stroke="#25D366" stroke-width="2"/>
  <text x="130" y="150" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">ROI</text>
  <text x="130" y="185" text-anchor="middle" fill="#25D366" font-size="32" font-weight="700">15-30x</text>
  <text x="130" y="215" text-anchor="middle" fill="#888" font-size="11">Por cada euro</text>
  <text x="130" y="232" text-anchor="middle" fill="#888" font-size="11">invertido</text>
  <text x="130" y="270" text-anchor="middle" fill="#fff" font-size="10">Traduccion:</text>
  <text x="130" y="285" text-anchor="middle" fill="#fff" font-size="10">Ahorras 15-30 horas</text>
  <text x="130" y="298" text-anchor="middle" fill="#fff" font-size="10">semanales</text>
</svg>