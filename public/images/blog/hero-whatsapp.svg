<text x="1000" y="340" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="48" font-weight="800">95%</text>
<text x="1000" y="370" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">Precision</text>
