<text x="575" y="284" fill="#ddd" font-family="system-ui" font-size="10">mes. Quieres mas info?</text>
<rect x="475" y="305" width="150" height="35" rx="10" fill="#1a1a1a"/>
<text x="485" y="327" fill="#ccc" font-family="system-ui" font-size="11">Si, me interesa</text>
