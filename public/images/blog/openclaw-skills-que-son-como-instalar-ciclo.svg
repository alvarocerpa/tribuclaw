<rect x="620" y="80" width="155" height="90" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="697" y="110" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="24" font-weight="700">4</text>
<text x="697" y="130" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">EJECUTAR</text>
