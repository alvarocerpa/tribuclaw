<text x="507" y="110" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="24" font-weight="700">3</text>
<text x="507" y="130" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="600">CARGAR</text>
