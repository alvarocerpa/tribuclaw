<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo negro -->
  <rect width="1200" height="630" fill="#050505"/>

  <!-- Círculo decorativo rosa -->
  <circle cx="1100" cy="100" r="200" fill="#e94560" opacity="0.1"/>

  <!-- Terminal/Code background -->
  <g transform="translate(900, 80)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="#111" stroke="#e94560" stroke-width="2" opacity="0.5"/>
    <circle cx="20" cy="20" r="6" fill="#e94560"/>
    <circle cx="40" cy="20" r="6" fill="#333"/>
    <circle cx="60" cy="20" r="6" fill="#333"/>
    <text x="20" y="50" font-family="monospace" font-size="12" fill="#e0e0e0">$ openclaw init</text>
    <text x="20" y="70" font-family="monospace" font-size="12" fill="#e94560">[OK] Setup ready</text>
    <text x="20" y="90" font-family="monospace" font-size="12" fill="#e0e0e0">$ start</text>
  </g>

  <!-- Pasos numerados -->
  <g transform="translate(100, 380)">
    <!-- Paso 1 -->
    <circle cx="60" cy="60" r="30" fill="#e94560"/>
    <text x="60" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#050505">1</text>
    <text x="60" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Instalar</text>

    <!-- Paso 2 -->
    <circle cx="200" cy="60" r="30" fill="#e94560"/>
    <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#050505">2</text>
    <text x="200" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Configurar</text>

    <!-- Paso 3 -->
    <circle cx="340" cy="60" r="30" fill="#e94560"/>
    <text x="340" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#050505">3</text>
    <text x="340" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Arrancar</text>

    <!-- Líneas conectoras -->
    <line x1="95" y1="60" x2="165" y2="60" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="235" y1="60" x2="305" y2="60" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
  </g>

  <!-- Bandera España sutil -->
  <g transform="translate(1020, 450)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.3"/>
    <rect x="0" y="0" width="120" height="26" fill="#c60b1e" opacity="0.5"/>
    <rect x="0" y="54" width="120" height="26" fill="#c60b1e" opacity="0.5"/>
    <rect x="0" y="26" width="120" height="28" fill="#ffc400" opacity="0.5"/>
    <text x="60" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e94560">ES</text>
  </g>

  <!-- Título principal -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#e0e0e0">OpenClaw Tutorial Español</text>

  <!-- Subtítulo rosa -->
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="24" fill="#e94560">Configuración Completa Desde Cero</text>

  <!-- Logo claw decorativo -->
  <g transform="translate(80, 100)">
    <path d="M15 0 L15 40 M15 10 L5 20 M15 20 L25 10 M15 30 L5 40 M15 40 L25 30" stroke="#e94560" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>