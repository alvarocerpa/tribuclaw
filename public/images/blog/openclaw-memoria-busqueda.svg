<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
<rect width="800" height="380" fill="#080808"/>
<rect x="20" y="20" width="760" height="340" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<text x="400" y="55" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="15" font-weight="700">BUSQUEDA HIBRIDA: TEXTO + SEMANTICA</text>

<!-- User query -->
<rect x="250" y="75" width="300" height="45" rx="10" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="400" y="103" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">"Que decidimos sobre la autenticacion?"</text>

<!-- Arrow down -->
<line x1="400" y1="120" x2="400" y2="145" stroke="#e94560" stroke-width="1.5"/>

<!-- Split into two paths -->
<rect x="60" y="150" width="300" height="100" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="210" y="178" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">BUSQUEDA TEXTO</text>
<text x="210" y="200" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">Palabras clave: "autenticacion"</text>
<text x="210" y="218" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Busca en indices de notas diarias</text>
<text x="210" y="236" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">y conocimiento consolidado</text>

<rect x="440" y="150" width="300" height="100" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="590" y="178" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="13" font-weight="700">BUSQUEDA SEMANTICA</text>
<text x="590" y="200" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">Embedding de la pregunta</text>
<text x="590" y="218" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Similitud coseno contra</text>
<text x="590" y="236" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">indice vectorial HNSW</text>

<!-- Merge arrow -->
<line x1="210" y1="250" x2="210" y2="275" stroke="#555" stroke-width="1"/>
<line x1="590" y1="250" x2="590" y2="275" stroke="#555" stroke-width="1"/>
<line x1="210" y1="275" x2="590" y2="275" stroke="#555" stroke-width="1"/>
<line x1="400" y1="275" x2="400" y2="290" stroke="#e94560" stroke-width="1.5"/>

<!-- Result -->
<rect x="200" y="290" width="400" height="50" rx="10" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="400" y="312" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12" font-weight="600">Top 5 memorias relevantes inyectadas</text>
<text x="400" y="330" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="11" font-weight="600">Menos de 10ms de latencia total</text>

<text x="400" y="355" text-anchor="middle" fill="#555" font-family="system-ui" font-size="10">tribuclaw.com</text>
</svg>
