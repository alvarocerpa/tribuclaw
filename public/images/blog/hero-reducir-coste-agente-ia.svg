<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Fondo negro -->
  <rect width="1200" height="630" fill="#050505"/>
  
  <!-- Círculo decorativo rosa -->
  <circle cx="1050" cy="150" r="250" fill="#e94560" opacity="0.08"/>
  <circle cx="150" cy="500" r="150" fill="#e94560" opacity="0.05"/>
  
  <!-- Grid sutil -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.3">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
  </g>
  
  <!-- Título principal -->
  <text x="80" y="180" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="52" font-weight="800">Reducir Coste</text>
  <text x="80" y="250" fill="#e0e0e0" font-family="system-ui, sans-serif" font-size="52" font-weight="800">Agente IA</text>
  
  <!-- Subtítulo rosa -->
  <text x="80" y="310" fill="#e94560" font-family="system-ui, sans-serif" font-size="22" font-weight="600">-80% COSTE SIN PERDER CALIDAD</text>
  
  <!-- Gráfico de bajada de coste -->
  <g transform="translate(700, 150)">
    <!-- Ejes -->
    <line x1="0" y1="200" x2="400" y2="200" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="200" stroke="#333" stroke-width="2"/>
    
    <!-- Línea de coste bajando -->
    <polyline points="30,30 100,50 170,90 240,130 310,160 380,175" 
              stroke="#e94560" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Puntos en la línea -->
    <circle cx="30" cy="30" r="8" fill="#e94560"/>
    <circle cx="170" cy="90" r="8" fill="#e94560"/>
    <circle cx="310" cy="160" r="8" fill="#e94560"/>
    <circle cx="380" cy="175" r="8" fill="#4ade80"/>
    
    <!-- Etiquetas -->
    <text x="20" y="20" fill="#888" font-family="system-ui" font-size="14">100€</text>
    <text x="300" y="150" fill="#4ade80" font-family="system-ui" font-size="14" font-weight="600">&lt;20€</text>
  </g>
  
  <!-- Iconos de ahorro -->
  <g transform="translate(80, 400)">
    <!-- Euro tachado -->
    <text x="0" y="50" fill="#e94560" font-family="system-ui" font-size="60">€</text>
    <line x1="-10" y1="15" x2="50" y2="75" stroke="#e94560" stroke-width="4"/>
    
    <!-- Flecha hacia abajo -->
    <text x="100" y="55" fill="#4ade80" font-family="system-ui" font-size="50">↓</text>
    
    <!-- Nuevo coste -->
    <text x="160" y="50" fill="#4ade80" font-family="system-ui" font-size="40" font-weight="700">&lt;20€</text>
    <text x="160" y="75" fill="#888" font-family="system-ui" font-size="16">/mes</text>
  </g>
  
  <!-- Badge de ahorro -->
  <rect x="450" y="430" width="200" height="60" rx="30" fill="#e94560"/>
  <text x="550" y="470" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="24" font-weight="700">Ahorra 80€/mes</text>
  
  <!-- Footer -->
  <text x="600" y="590" text-anchor="middle" fill="#555" font-family="system-ui" font-size="14">tribuclaw.com</text>
</svg>