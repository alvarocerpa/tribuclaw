<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
<rect width="800" height="380" fill="#080808"/>
<rect x="20" y="20" width="760" height="340" rx="16" fill="#0d0d0d" stroke="#1a1a1a"/>

<!-- 5 pasos del flujo -->
<!-- Paso 1 -->
<rect x="50" y="80" width="130" height="180" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="115" y="120" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="32" font-weight="300">1</text>
<text x="115" y="160" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">CONSULTA</text>
<text x="115" y="185" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Emails nuevos</text>
<text x="115" y="205" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">desde ultima</text>
<text x="115" y="225" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">revision</text>
<text x="115" y="255" text-anchor="middle" fill="#555" font-family="system-ui" font-size="9">Gmail API / IMAP</text>

<!-- Flecha 1 -->
<path d="M180 170 L210 170" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Paso 2 -->
<rect x="220" y="80" width="130" height="180" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="285" y="120" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="32" font-weight="300">2</text>
<text x="285" y="160" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">DESCARGA</text>
<text x="285" y="185" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Asunto, cuerpo,</text>
<text x="285" y="205" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">adjuntos,</text>
<text x="285" y="225" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">remitente</text>
<text x="285" y="255" text-anchor="middle" fill="#555" font-family="system-ui" font-size="9">Contexto completo</text>

<!-- Flecha 2 -->
<path d="M350 170 L380 170" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Paso 3 -->
<rect x="390" y="80" width="130" height="180" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="455" y="120" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="32" font-weight="300">3</text>
<text x="455" y="160" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">PROCESA</text>
<text x="455" y="185" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Modelo LLM</text>
<text x="455" y="205" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">entiende</text>
<text x="455" y="225" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">contenido</text>
<text x="455" y="255" text-anchor="middle" fill="#555" font-family="system-ui" font-size="9">Contexto, no keywords</text>

<!-- Flecha 3 -->
<path d="M520 170 L550 170" stroke="#e94560" stroke-width="2" marker-end="url(#arrow)"/>

<!-- Paso 4 -->
<rect x="560" y="80" width="130" height="180" rx="10" fill="#111" stroke="#e94560" stroke-width="1.5"/>
<text x="625" y="120" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="32" font-weight="300">4</text>
<text x="625" y="160" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">CLASIFICA</text>
<text x="625" y="185" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">Aplica reglas</text>
<text x="625" y="205" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">personalizadas</text>
<text x="625" y="225" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10">de prioridad</text>
<text x="625" y="255" text-anchor="middle" fill="#555" font-family="system-ui" font-size="9">Urgente / Archivar</text>

<!-- Paso 5 abajo -->
<rect x="280" y="280" width="240" height="60" rx="10" fill="#111" stroke="#e94560" stroke-width="2"/>
<text x="400" y="305" text-anchor="middle" fill="#e94560" font-family="system-ui" font-size="28" font-weight="300">5</text>
<text x="400" y="330" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="600">RESUMEN via Telegram / WhatsApp</text>

<!-- Flechas hacia paso 5 -->
<path d="M625 260 L625 310 L520 310" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,4"/>
<path d="M115 260 L115 310 L280 310" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,4"/>

<!-- Marcador de flecha -->
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#e94560"/>
</marker>
</defs>

<text x="400" y="365" text-anchor="middle" fill="#555" font-family="system-ui" font-size="11">Flujo de procesamiento cada 15 minutos</text>
</svg>