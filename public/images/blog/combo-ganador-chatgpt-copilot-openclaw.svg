<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="380" fill="#080808"/>
  
  <!-- Container -->
  <rect x="20" y="20" width="760" height="340" rx="12" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Title -->
  <text x="400" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">EL COMBO GANADOR</text>
  <text x="400" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888" text-anchor="middle">Cada uno cubre un hueco. Juntos te dan superpoderes.</text>
  
  <!-- Central Hub -->
  <circle cx="400" cy="210" r="50" fill="#1a1a1a" stroke="#e94560" stroke-width="3"/>
  <text x="400" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e94560" text-anchor="middle">TU</text>
  <text x="400" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e94560" text-anchor="middle">WORKFLOW</text>
  
  <!-- Connection Lines -->
  <line x1="350" y1="210" x2="200" y2="210" stroke="#10a37f" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="400" y1="160" x2="400" y2="110" stroke="#238636" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="450" y1="210" x2="600" y2="210" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- ChatGPT Node -->
  <circle cx="130" cy="210" r="65" fill="#0a0a0a" stroke="#10a37f" stroke-width="2"/>
  <text x="130" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#10a37f" text-anchor="middle">ChatGPT</text>
  <text x="130" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">5-10 veces/dia</text>
  <text x="130" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">Brainstorming</text>
  
  <!-- ChatGPT Use Cases -->
  <rect x="50" y="290" width="160" height="55" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="130" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Consultas rapidas</text>
  <text x="130" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Ideas y opiniones</text>
  <text x="130" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Revision de textos</text>
  
  <!-- Copilot Node -->
  <circle cx="400" cy="100" r="55" fill="#0a0a0a" stroke="#238636" stroke-width="2"/>
  <text x="400" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#238636" text-anchor="middle">Copilot</text>
  <text x="400" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888" text-anchor="middle">8h/dia activo</text>
  <text x="400" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">En el IDE</text>
  
  <!-- Copilot Use Cases -->
  <rect x="240" y="290" width="160" height="55" rx="6" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="320" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Autocompletado</text>
  <text x="320" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Generar codigo</text>
  <text x="320" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" text-anchor="middle">Tests unitarios</text>
  
  <!-- OpenClaw Node -->
  <circle cx="670" cy="210" r="65" fill="#0a0a0a" stroke="#e94560" stroke-width="3"/>
  <text x="670" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e94560" text-anchor="middle">OpenClaw</text>
  <text x="670" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e94560" text-anchor="middle">24/7 activo</text>
  <text x="670" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">En segundo plano</text>
  
  <!-- OpenClaw Use Cases -->
  <rect x="590" y="290" width="160" height="55" rx="6" fill="#0a0a0a" stroke="#e94560" stroke-width="1"/>
  <text x="670" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Revisar emails</text>
  <text x="670" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Organizar agenda</text>
  <text x="670" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#fff" text-anchor="middle">Automatizar tareas</text>
  
  <!-- Time indicator -->
  <text x="130" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#10a37f" text-anchor="middle">Puntual</text>
  <text x="400" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#238636" text-anchor="middle">Mientras programas</text>
  <text x="670" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e94560" text-anchor="middle">Siempre</text>
</svg>
