<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="rgba(255,255,255,0.04)"/>
  <circle cx="100" cy="530" r="120" fill="rgba(255,255,255,0.03)"/>
  <!-- Gear icon -->
  <g transform="translate(900,280) scale(0.8)" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3">
    <circle cx="0" cy="0" r="40"/>
    <circle cx="0" cy="0" r="15"/>
    <line x1="0" y1="-50" x2="0" y2="-35"/><line x1="0" y1="35" x2="0" y2="50"/>
    <line x1="-50" y1="0" x2="-35" y2="0"/><line x1="35" y1="0" x2="50" y2="0"/>
  </g>
  <!-- Clock icon -->
  <g transform="translate(1020,400) scale(0.7)" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3">
    <circle cx="0" cy="0" r="35"/>
    <line x1="0" y1="0" x2="0" y2="-20"/>
    <line x1="0" y1="0" x2="15" y2="5"/>
  </g>
  <!-- Text -->
  <text x="80" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white">5 AUTOMATIZACIONES</text>
  <text x="80" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="white">QUE TE AHORRAN</text>
  <text x="80" y="370" font-family="system-ui,-apple-system,sans-serif" font-size="56" font-weight="700" fill="#a5b4fc">10 HORAS SEMANALES</text>
  <!-- Bottom bar -->
  <rect x="80" y="480" width="120" height="4" rx="2" fill="#a5b4fc"/>
  <text x="80" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.7)">TRIBUCLAW</text>
  <text x="80" y="570" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">tribuclaw.com</text>
